    // Konversi File → base64
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          // Hapus prefix "data:mime;base64,"
          const base64 = reader.result.split(',')[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Upload file ke Google Drive via Apps Script
    // onProgress(pct) dipanggil selama proses (0-100)
  // Upload file ke Google Drive via Apps Script
async function uploadToDrive(file, subFolder, onProgress) {
  onProgress && onProgress(10);
  const base64Data = await fileToBase64(file);
  onProgress && onProgress(40);

  const params = new URLSearchParams();
  params.append('action', 'upload');
  params.append('namaFile', file.name);
  params.append('mimeType', file.type || 'application/octet-stream');
  params.append('subFolder', subFolder);
  params.append('fileData', base64Data);

  onProgress && onProgress(60);

  const res = await fetch(DRIVE_API, {
    method: 'POST',
    redirect: 'follow',           // ← TAMBAHAN: ikuti redirect GAS
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
    },
    body: params.toString()
  });

  onProgress && onProgress(90);

  // GAS kadang return HTML error page jika ada masalah server
  const responseText = await res.text();
  
  let json;
  try {
    // Bersihkan karakter tak terduga sebelum parse
    const cleaned = responseText.trim().replace(/^\uFEFF/, ''); // hapus BOM jika ada
    json = JSON.parse(cleaned);
  } catch(e) {
    console.error('Response bukan JSON. Raw response:', responseText.substring(0, 500));
    throw new Error('Server error: ' + (responseText.substring(0, 100) || 'Response tidak valid'));
  }

  onProgress && onProgress(100);

  if (!json.ok) {
    throw new Error(json.error || 'Upload gagal');
  }
  
  return json;
}

    // Hapus file dari Google Drive via Apps Script
async function deleteFromDrive(fileId) {
  if (!fileId) return;
  try {
    const params = new URLSearchParams();
    params.append('action', 'delete');
    params.append('fileId', fileId);
    
    await fetch(DRIVE_API, {
      method: 'POST',
      redirect: 'follow',   // ← TAMBAHAN
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
      },
      body: params.toString()
    });
  } catch(e) { console.warn('Gagal hapus dari Drive:', e); }
}

          getDocs(query(collection(db,'absensi'),where('mahasiswaId','==',user.id))),
          getDoc(doc(db,'nilai_akhir',user.id))
        ]);
        const hadir=absSnap.docs.filter(d=>d.data().status==='hadir').length;
        const n=nilaiSnap.exists()?nilaiSnap.data():{};
        setContent(`
          <div class="dash-hero">
            <div class="dash-greet">${greeting}</div>
            <div class="dash-name">${user.nama}</div>
            <div class="dash-sub">NIM ${user.nim||'-'} · ${user.prodi||''}</div>
          </div>
          <div class="stats-grid">
            <div class="stat-card" style="--c:#4f46e5">
              <div class="stat-ico" style="background:#eef2ff;color:#4f46e5">${svgIcon('check-square')}</div>
              <div class="stat-val">${hadir}<span style="font-size:14px;font-weight:500;color:var(--muted)">/${absSnap.size}</span></div>
              <div class="stat-lbl">Hadir</div>
            </div>
            <div class="stat-card" style="--c:#059669">
              <div class="stat-ico" style="background:#ecfdf5;color:#059669">${svgIcon('bar-chart-2')}</div>
              <div class="stat-val">${n.nilaiAkhir||'-'}</div>
              <div class="stat-lbl">Nilai Akhir</div>
            </div>
            <div class="stat-card" style="--c:#d97706">
              <div class="stat-ico" style="background:#fffbeb;color:#d97706">${svgIcon('book-open')}</div>
              <div class="stat-val">16</div>
              <div class="stat-lbl">Total Materi</div>
            </div>
            <div class="stat-card" style="--c:#7c3aed">
              <div class="stat-ico" style="background:#f5f3ff;color:#7c3aed">${svgIcon('edit')}</div>
              <div class="stat-val">-</div>
              <div class="stat-lbl">Tugas</div>
            </div>
          </div>
          <div class="quick-actions">
            <div class="section-title">Aksi Cepat</div>
            <div class="qa-grid">
              <div class="qa-card" onclick="go('pertemuan')"><div class="qa-ico" style="background:#eef2ff;color:#4f46e5">${svgIcon('calendar')}</div><div>Materi Kuliah</div></div>
              <div class="qa-card" onclick="go('absensi_mhs')"><div class="qa-ico" style="background:#ecfdf5;color:#059669">${svgIcon('check-square')}</div><div>Absensi Saya</div></div>
              <div class="qa-card" onclick="go('nilai_mhs')"><div class="qa-ico" style="background:#fffbeb;color:#d97706">${svgIcon('bar-chart-2')}</div><div>Nilai Saya</div></div>
              <div class="qa-card" onclick="go('notifikasi')"><div class="qa-ico" style="background:#f5f3ff;color:#7c3aed">${svgIcon('bell')}</div><div>Notifikasi</div></div>
            </div>
          </div>`);
      }
    }

    function getGreeting(){
      const h=new Date().getHours();
      if(h<11)return'Selamat Pagi 🌤';
      if(h<15)return'Selamat Siang ☀️';
      if(h<18)return'Selamat Sore 🌇';
      return'Selamat Malam 🌙';
    }

    // ── PERTEMUAN ────────────────────────────────────────────
    async function renderPertemuan(){
      const isDsn = user.role === 'dosen';
      const snap=await getDocs(collection(db,'pertemuan'));
      const prts=[];snap.forEach(d=>prts.push({id:d.id,...d.data()}));
      prts.sort((a,b)=>(a.pertemuanKe||0)-(b.pertemuanKe||0));
      if(prts.length===0){
        setContent(`<div class="empty"><div class="empty-ico">📅</div><h3>Belum ada pertemuan</h3><p>${isDsn?'Tambahkan pertemuan melalui Firebase Console.':'Belum ada materi yang tersedia.'}</p></div>`);
        return;
      }
      setContent(`
        <div class="section-title" style="margin-bottom:12px">${prts.length} Pertemuan tersedia</div>
        <div class="prt-grid">${prts.map(p=>`
          <div class="prt-card" onclick="bukaPrt('${p.id}')">
            <div class="prt-num">Pertemuan ${p.pertemuanKe}</div>
            <div class="prt-topik">${p.topik||'—'}</div>
            <div class="prt-arrow">${svgIcon('arrow-left')}</div>
          </div>`).join('')}
        </div>`);
    }

    window.bukaPrt=async(prtId)=>{
      const snap=await getDoc(doc(db,'pertemuan',prtId));
      if(snap.exists()){_prt={id:prtId,...snap.data()};renderPrtDetail(_prt,'materi');}
    };

    function renderPrtDetail(p,tab){
      const tabs=[
        {k:'materi',l:'Materi'},
        {k:'tugas',l:'Tugas'},
        {k:'kuis',l:'Kuis'},
        {k:'absensi',l:'Absensi'},
      ];
      setContent(`
        <div class="prt-detail-header">
          <button class="btn-back" onclick="go('pertemuan')">${svgIcon('arrow-left')} Kembali</button>
          <div>
            <div class="prt-detail-badge">Pertemuan ${p.pertemuanKe}</div>
            <div class="prt-detail-title">${p.topik||''}</div>
          </div>
        </div>
        <div class="dtabs">${tabs.map(t=>`<div class="dtab${t.k===tab?' on':''}" data-tab="${t.k}" onclick="loadTab('${t.k}')">${t.l}</div>`).join('')}</div>
        <div id="tabContent"><div class="loading"><div class="spin"></div><span>Memuat...</span></div></div>`);
      loadTab(tab);
    }

    window.loadTab=async(tab)=>{
      if(!_prt)return;
      document.querySelectorAll('.dtab').forEach(t=>t.classList.toggle('on', t.dataset.tab===tab));
      const tc=document.getElementById('tabContent');
      if(!tc)return;
      if(tab==='materi') await renderMateriTab();
      else if(tab==='tugas') await renderTugasTab();
      else if(tab==='kuis') await renderKuisTab();
      else if(tab==='absensi') await renderAbsensiTab();
    };

    // ══════════════════════════════════════════════════
    // ── MATERI TAB ────────────────────────────────────
    // ══════════════════════════════════════════════════
    async function renderMateriTab(){
      const isDsn = user.role === 'dosen';
      const tc = document.getElementById('tabContent');
      if(!tc) return;

      let items = [];
      try {
        const snap = await getDocs(collection(db,'pertemuan',_prt.id,'materi'));
        snap.forEach(d => items.push({id:d.id,...d.data()}));
        items.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
      } catch(e) {
        tc.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><h3>Gagal memuat</h3><p>${e.message}</p></div>`;
        return;
      }

      let html = `<div class="materi-list" id="materi-list">`;
      if(items.length === 0){
        html += `<div class="empty"><div class="empty-ico">📄</div><h3>Belum ada materi</h3><p>${isDsn?'Tambahkan materi di bawah.':'Dosen belum menambahkan materi.'}</p></div>`;
      } else {
        items.forEach(m=>{
          if(m.tipe==='file'){
            const icon = getFileIcon(m.namaFile||'');
            html += `
              <div class="materi-item">
                <div class="materi-icon-wrap">${icon}</div>
                <div class="materi-info">
                  <div class="materi-judul">${m.judul}</div>
                  <div class="materi-meta">${m.namaFile||''} ${m.ukuran?'· '+m.ukuran:''} · <span style="color:#059669">📁 Google Drive</span></div>
                </div>
                <div class="materi-actions">
                  <a href="${m.fileUrl}" target="_blank" class="btn-action btn-primary">${svgIcon('download')} Unduh</a>
                  ${m.viewUrl?`<a href="${m.viewUrl}" target="_blank" class="btn-action btn-secondary">👁️ Lihat</a>`:''}
                  ${isDsn?`<button class="btn-action btn-danger" onclick="hapusMateri('${m.id}','${m.fileId||''}')">${svgIcon('trash')}</button>`:''}
                </div>
              </div>`;
          } else if(m.tipe==='teks'){
            html += `
              <div class="materi-item">
                <div class="materi-icon-wrap">📝</div>
                <div class="materi-info">
                  <div class="materi-judul">${m.judul}</div>
                  <div class="materi-meta">Konten teks</div>
                </div>
                <div class="materi-actions">
                  <button class="btn-action btn-primary" onclick="bacaMateriTeks('${m.id}')">${svgIcon('book-open')} Baca</button>
                  ${isDsn?`
                    <button class="btn-action btn-secondary" onclick="editMateriTeks('${m.id}')">${svgIcon('edit')} Edit</button>
                    <button class="btn-action btn-danger" onclick="hapusMateri('${m.id}','')">${svgIcon('trash')}</button>`:''}
                </div>
              </div>`;
          }
        });
      }
      html += `</div>`;

      if(isDsn){
        html += `
          <div class="add-materi-card">
            <div class="add-materi-title">${svgIcon('plus')} Tambah Materi</div>
            <div class="tipe-tabs">
              <div class="tipe-tab on" id="tipeFile" onclick="switchTipe('file')">${svgIcon('upload')} Upload File</div>
              <div class="tipe-tab" id="tipeTeks" onclick="switchTipe('teks')">${svgIcon('file-text')} Konten Teks</div>
            </div>
            <div id="formFile">
              <input class="inp" id="judulFile" placeholder="Judul materi...">
              <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-ico">${svgIcon('upload')}</div>
                <div class="upload-txt">Klik untuk pilih file</div>
                <div class="upload-sub">PDF, PPT, Gambar, Video — semua format didukung · Tersimpan di Google Drive 📁</div>
                <input type="file" id="fileInput" style="display:none" accept="*/*" onchange="previewFile(this)">
              </div>
              <div id="filePreview" style="display:none" class="file-preview-box"></div>
              <div id="uploadProgress" style="display:none" class="upload-progress">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-txt" id="progressTxt">Mengupload ke Google Drive...</div>
              </div>
              <button class="btn-submit" id="submitFileBtn" onclick="uploadMateriFile()">Upload & Simpan ke Drive</button>
            </div>
            <div id="formTeks" style="display:none">
              <input class="inp" id="judulTeks" placeholder="Judul materi...">
              <div id="quillEditor" style="height:280px"></div>
              <button class="btn-submit" style="margin-top:12px" onclick="simpanMateriTeks()">Simpan Materi</button>
            </div>
          </div>`;
      }

      tc.innerHTML = html;

      if(isDsn){
        _quill = new Quill('#quillEditor', {
          theme: 'snow',
          placeholder: 'Tulis konten materi di sini...',
          modules: { toolbar: [
            [{header:[1,2,3,false]}],
            ['bold','italic','underline','strike'],
            [{color:[]},{background:[]}],
            [{list:'ordered'},{list:'bullet'}],
            ['blockquote','code-block'],
            ['link','image'],
            ['clean']
          ]}
        });
      }
    }

    function getFileIcon(nama){
      const ext=(nama.split('.').pop()||'').toLowerCase();
      if(ext==='pdf') return '📄';
      if(['ppt','pptx'].includes(ext)) return '📊';
      if(['jpg','jpeg','png','gif','webp'].includes(ext)) return '🖼️';
      if(['mp4','mov','avi','mkv'].includes(ext)) return '🎬';
      if(['doc','docx'].includes(ext)) return '📝';
      if(['xls','xlsx'].includes(ext)) return '📈';
      if(['zip','rar'].includes(ext)) return '🗜️';
      return '📎';
    }

    window.switchTipe=(tipe)=>{
      document.getElementById('tipeFile').classList.toggle('on',tipe==='file');
      document.getElementById('tipeTeks').classList.toggle('on',tipe==='teks');
      document.getElementById('formFile').style.display=tipe==='file'?'block':'none';
      document.getElementById('formTeks').style.display=tipe==='teks'?'block':'none';
    };

    window.previewFile=(input)=>{
      const file=input.files[0]; if(!file)return;
      const size=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' MB':(file.size/1024).toFixed(0)+' KB';
      const preview=document.getElementById('filePreview');
      preview.style.display='flex';
      preview.innerHTML=`<span style="font-size:28px">${getFileIcon(file.name)}</span><div><div style="font-weight:600;font-size:14px">${file.name}</div><div style="font-size:12px;color:var(--muted)">${size}</div></div>`;
      document.getElementById('uploadArea').style.display='none';
    };

    // ══ UPLOAD MATERI → GOOGLE DRIVE ══
    window.uploadMateriFile=async()=>{
      const judul=document.getElementById('judulFile').value.trim();
      const fileInput=document.getElementById('fileInput');
      const file=fileInput.files[0];
      if(!judul) return toast('⚠️ Isi judul materi dulu');
      if(!file) return toast('⚠️ Pilih file dulu');

      const size=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' MB':(file.size/1024).toFixed(0)+' KB';
      document.getElementById('uploadProgress').style.display='block';
      document.getElementById('submitFileBtn').disabled=true;

      try {
        const result = await window._uploadToDrive(file, 'materi_'+_prt.id, (pct)=>{
          document.getElementById('progressFill').style.width=pct+'%';
          document.getElementById('progressTxt').textContent=`Mengupload ke Google Drive ${pct}%...`;
        });

        await addDoc(collection(db,'pertemuan',_prt.id,'materi'),{
          judul,
          tipe: 'file',
          fileUrl: result.fileUrl,
          viewUrl: result.viewUrl,
          fileId: result.fileId,         // ID Drive untuk hapus
          namaFile: file.name,
          ukuran: size,
          createdAt: serverTimestamp()
        });

        toast('✅ Materi berhasil diupload ke Google Drive!');
        await renderMateriTab();
      } catch(e) {
        toast('❌ Upload gagal: '+e.message);
        document.getElementById('uploadProgress').style.display='none';
        document.getElementById('submitFileBtn').disabled=false;
      }
    };

    window.simpanMateriTeks=async()=>{
      const judul=document.getElementById('judulTeks').value.trim();
      if(!judul) return toast('⚠️ Isi judul materi dulu');
      if(!_quill) return;
      if(_quill.getText().trim().length===0) return toast('⚠️ Isi konten materi dulu');
      const konten=_quill.root.innerHTML;
      await addDoc(collection(db,'pertemuan',_prt.id,'materi'),{
        judul,tipe:'teks',konten,createdAt:serverTimestamp()
      });
      toast('✅ Materi teks tersimpan!');
      await renderMateriTab();
    };

    window.bacaMateriTeks=async(materiId)=>{
      const snap=await getDoc(doc(db,'pertemuan',_prt.id,'materi',materiId));
      if(!snap.exists())return;
      const m=snap.data();
      openModal(m.judul,`<div class="materi-konten ql-editor" style="padding:0;border:none">${m.konten}</div>`);
    };

    window.editMateriTeks=async(materiId)=>{
      const snap=await getDoc(doc(db,'pertemuan',_prt.id,'materi',materiId));
      if(!snap.exists())return;
      const m=snap.data();
      openModal('Edit: '+m.judul,`
        <input class="inp" id="editJudul" value="${m.judul.replace(/"/g,'&quot;')}">
        <div id="editQuill" style="height:280px"></div>
        <button class="btn-submit" style="margin-top:12px" onclick="saveEditTeks('${materiId}')">Simpan Perubahan</button>
      `);
      setTimeout(()=>{
        const eq=new Quill('#editQuill',{theme:'snow',modules:{toolbar:[
          [{header:[1,2,3,false]}],['bold','italic','underline'],
          [{list:'ordered'},{list:'bullet'}],['link'],['clean']
        ]}});
        eq.root.innerHTML=m.konten;
        window._editQuill=eq;
      },150);
    };

    window.saveEditTeks=async(materiId)=>{
      const judul=document.getElementById('editJudul').value.trim();
      if(!judul||!window._editQuill)return;
      await updateDoc(doc(db,'pertemuan',_prt.id,'materi',materiId),{judul,konten:window._editQuill.root.innerHTML});
      closeModal(); toast('✅ Materi diperbarui!');
      await renderMateriTab();
    };

    // ══ HAPUS MATERI → hapus dari Drive juga ══
    window.hapusMateri=async(materiId, fileId)=>{
      if(!confirm('Hapus materi ini?'))return;
      // Hapus dari Google Drive
      if(fileId) await window._deleteFromDrive(fileId);
      // Hapus dari Firestore
      await deleteDoc(doc(db,'pertemuan',_prt.id,'materi',materiId));
      toast('🗑️ Materi dihapus');
      await renderMateriTab();
    };

    // ══════════════════════════════════════════════════
    // ── TUGAS TAB ─────────────────────────────────────
    // ══════════════════════════════════════════════════
    async function renderTugasTab(){
      const isDsn = user.role === 'dosen';
      const tc = document.getElementById('tabContent');
      if(!tc) return;

      let tugasList = [];
      try {
        const snap = await getDocs(collection(db,'pertemuan',_prt.id,'tugas'));
        snap.forEach(d => tugasList.push({id:d.id,...d.data()}));
        tugasList.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
      } catch(e) {
        tc.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><h3>Gagal memuat tugas</h3><p>${e.message}</p></div>`;
        return;
      }

      let html = '';

      if(isDsn){
        if(tugasList.length === 0){
          html += `<div class="empty" style="padding:40px 20px"><div class="empty-ico">📝</div><h3>Belum ada tugas</h3><p>Tambahkan tugas pertama untuk pertemuan ini.</p></div>`;
        } else {
          html += `<div class="tugas-list">`;
          for(const t of tugasList){
            let jumlahKumpul = 0;
            try {
              const kumpulSnap = await getDocs(collection(db,'pertemuan',_prt.id,'tugas',t.id,'pengumpulan'));
              jumlahKumpul = kumpulSnap.size;
            } catch(e){}
            const batas = t.batasWaktu ? new Date(t.batasWaktu).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Tidak ada batas';
            html += `
              <div class="tugas-card">
                <div class="tugas-card-header">
                  <div>
                    <div class="tugas-judul">${t.judul}</div>
                    <div class="tugas-meta">${svgIcon('clock')} Batas: ${batas}</div>
                  </div>
                  <div style="display:flex;gap:6px;align-items:flex-start">
                    <span class="badge badge-blue">${jumlahKumpul} Terkumpul</span>
                    <button class="btn-action btn-danger" onclick="hapusTugas('${t.id}')">${svgIcon('trash')}</button>
                  </div>
                </div>
                <div class="tugas-deskripsi">${t.deskripsi||''}</div>
                <div style="margin-top:10px">
                  <button class="btn-action btn-secondary" onclick="lihatPengumpulan('${t.id}','${t.judul.replace(/'/g,"\\'")}')">📋 Lihat Pengumpulan (${jumlahKumpul})</button>
                </div>
              </div>`;
          }
          html += `</div>`;
        }

        html += `
          <div class="add-materi-card">
            <div class="add-materi-title">${svgIcon('plus')} Buat Tugas Baru</div>
            <div>
              <input class="inp" id="tugasJudul" placeholder="Judul tugas...">
              <textarea class="inp" id="tugasDeskripsi" placeholder="Deskripsi / instruksi tugas..." style="resize:vertical;min-height:100px"></textarea>
              <label style="font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:6px">Batas Waktu Pengumpulan</label>
              <input class="inp" type="datetime-local" id="tugasBatas">
              <button class="btn-submit" onclick="simpanTugas()">Buat Tugas</button>
            </div>
          </div>`;
      } else {
        // Mahasiswa
        if(tugasList.length === 0){
          html += `<div class="empty"><div class="empty-ico">📝</div><h3>Belum ada tugas</h3><p>Dosen belum memberikan tugas untuk pertemuan ini.</p></div>`;
        } else {
          html += `<div class="tugas-list">`;
          for(const t of tugasList){
            let sudahKumpul = false;
            let kumpulData = null;
            try {
              const kSnap = await getDoc(doc(db,'pertemuan',_prt.id,'tugas',t.id,'pengumpulan',user.id));
              if(kSnap.exists()){ sudahKumpul = true; kumpulData = kSnap.data(); }
            } catch(e){}
            const batas = t.batasWaktu ? new Date(t.batasWaktu) : null;
            const terlambat = batas && new Date() > batas;
            const batasStr = batas ? batas.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Tidak ada batas';
            html += `
              <div class="tugas-card">
                <div class="tugas-card-header">
                  <div>
                    <div class="tugas-judul">${t.judul}</div>
                    <div class="tugas-meta">${svgIcon('clock')} Batas: ${batasStr}</div>
                  </div>
                  ${sudahKumpul
                    ? `<span class="badge badge-green">✅ Terkumpul</span>`
                    : terlambat
                      ? `<span class="badge badge-red">⏰ Terlambat</span>`
                      : `<span class="badge badge-yellow">⏳ Belum Kumpul</span>`}
                </div>
                <div class="tugas-deskripsi">${t.deskripsi||''}</div>
                ${sudahKumpul
                  ? `<div class="kumpul-info">
                      <div style="font-size:12px;color:var(--g);font-weight:600">✅ Tugas sudah dikumpulkan</div>
                      ${kumpulData?.namaFile?`<div style="font-size:12px;color:var(--muted);margin-top:4px">📎 ${kumpulData.namaFile}</div>`:''}
                      ${kumpulData?.fileUrl?`<a href="${kumpulData.fileUrl}" target="_blank" class="btn-action btn-primary" style="margin-top:8px;display:inline-flex">${svgIcon('download')} Lihat File Saya</a>`:''}
                      ${kumpulData?.catatan?`<div style="font-size:12px;color:var(--ink2);margin-top:4px">"${kumpulData.catatan}"</div>`:''}
                    </div>`
                  : `<div class="kumpul-form" id="kumpulForm_${t.id}">
                      <textarea class="inp" id="kumpulCatatan_${t.id}" placeholder="Catatan / komentar (opsional)..." style="resize:vertical;min-height:60px;margin-top:10px"></textarea>
                      <div style="margin-bottom:10px">
                        <label class="upload-area" style="padding:16px;cursor:pointer;display:flex;align-items:center;gap:10px;justify-content:center" for="kumpulFile_${t.id}">
                          ${svgIcon('upload')}<span id="kumpulFileLabel_${t.id}">Lampirkan file tugas ke Google Drive (opsional)</span>
                          <input type="file" id="kumpulFile_${t.id}" style="display:none" onchange="previewKumpulFile('${t.id}',this)">
                        </label>

    // ══ KUMPUL TUGAS → Upload ke Google Drive ══
window.kumpulTugas = async(tugasId) => {
  const catatanEl = document.getElementById('kumpulCatatan_' + tugasId);
  const fileInput = document.getElementById('kumpulFile_' + tugasId);
  
  // Guard: pastikan form masih ada di DOM
  if (!catatanEl) {
    toast('❌ Form tidak ditemukan, coba refresh halaman');
    return;
  }
  
  const catatan = catatanEl.value.trim() || '';
  const file = fileInput?.files[0];

  const doSave = async(fileUrl, namaFile, fileId, viewUrl) => {
    await setDoc(doc(db, 'pertemuan', _prt.id, 'tugas', tugasId, 'pengumpulan', user.id), {
      mahasiswaId: user.id, nama: user.nama, nim: user.nim || '-',
      catatan,
      fileUrl: fileUrl || null,
      namaFile: namaFile || null,
      fileId: fileId || null,
      viewUrl: viewUrl || null,
      waktuKumpul: serverTimestamp()
    });
    toast('✅ Tugas berhasil dikumpulkan!');
    await renderTugasTab();
  };

  if (file) {
    const prog = document.getElementById('kumpulProgress_' + tugasId);
    const fill = document.getElementById('kumpulProgressFill_' + tugasId);
    const txt = document.getElementById('kumpulProgressTxt_' + tugasId);
    
    // Disable tombol submit agar tidak double-submit
    const submitBtn = document.querySelector(`[onclick="kumpulTugas('${tugasId}')"]`);
    if (submitBtn) submitBtn.disabled = true;
    
    if (prog) prog.style.display = 'block';

    try {
      const subFolder = 'tugas_' + _prt.id + '_' + tugasId;
      const result = await window._uploadToDrive(file, subFolder, (pct) => {
        if (fill) fill.style.width = pct + '%';
        if (txt) txt.textContent = 'Mengupload ke Google Drive ' + pct + '%...';
      });
      await doSave(result.fileUrl, file.name, result.fileId, result.viewUrl);
    } catch(e) {
      toast('❌ Upload gagal: ' + e.message);
      if (prog) prog.style.display = 'none';
      if (submitBtn) submitBtn.disabled = false;  // re-enable tombol
    }
  } else {
    // Tanpa file, langsung simpan
    await doSave(null, null, null, null);
  }
};

                    <button class="btn-action btn-danger" onclick="hapusKuis('${k.id}')">${svgIcon('trash')}</button>
                  </div>
                </div>
                <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
                  <button class="btn-action btn-secondary" onclick="lihatHasilKuis('${k.id}','${k.judul.replace(/'/g,"\\'")}')">📊 Lihat Hasil (${jawabanSnap.size})</button>

        }

        html += `
          <div class="add-materi-card">
            <div class="add-materi-title">${svgIcon('plus')} Buat Kuis Baru</div>
            <div>
              <input class="inp" id="kuisJudul" placeholder="Judul kuis...">
              <input class="inp" type="number" id="kuisDurasi" placeholder="Durasi (menit), contoh: 30" min="1" max="180">

              <div id="daftarPertanyaan"></div>
              <button class="btn-action btn-secondary" style="margin-bottom:12px;width:100%;justify-content:center" onclick="tambahPertanyaan()">
                ${svgIcon('plus')} Tambah Soal
              </button>

            </div>
          </div>`;
        tc.innerHTML = html;
        window._pertanyaan = [];
        tambahPertanyaan();
      } else {
        if(kuisList.length===0){
          html += `<div class="empty"><div class="empty-ico">❓</div><h3>Belum ada kuis</h3><p>Dosen belum membuat kuis untuk pertemuan ini.</p></div>`;
          tc.innerHTML = html; return;
        }

        html += `<div class="tugas-list">`;
        for(const k of kuisList){
          let sudahKerjakan = false;
          let hasilData = null;
          try {
            const hSnap = await getDoc(doc(db,'pertemuan',_prt.id,'kuis',k.id,'jawaban',user.id));
            if(hSnap.exists()){ sudahKerjakan=true; hasilData=hSnap.data(); }

          const pertSnap = await getDocs(collection(db,'pertemuan',_prt.id,'kuis',k.id,'pertanyaan'));
          html += `
            <div class="tugas-card">
              <div class="tugas-card-header">

                  <div class="tugas-judul">${k.judul}</div>

                </div>
                ${sudahKerjakan
                  ? `<span class="badge badge-green">✅ Selesai</span>`
                  : `<span class="badge badge-yellow">⏳ Belum dikerjakan</span>`}
              </div>
              ${sudahKerjakan
                ? `<div class="kumpul-info">
                    <div style="font-size:14px;font-weight:700;color:var(--p)">Nilai: ${hasilData?.nilai||0} / ${hasilData?.total||0}</div>
                    <div style="font-size:12px;color:var(--muted);margin-top:2px">Benar: ${hasilData?.benar||0} dari ${hasilData?.total||0} soal</div>
                  </div>`
                : `<button class="btn-submit" style="margin-top:10px" onclick="mulaiKuis('${k.id}','${k.judul.replace(/'/g,"\\'")}',${k.durasi||0})">Mulai Kerjakan</button>`
              }

    window._pertanyaan = [];
    window.tambahPertanyaan = ()=>{

    window.updateSoal = (idx,field,val)=>{
      if(!window._pertanyaan[idx])return;
      if(field==='soal')window._pertanyaan[idx].soal=val;
      else if(field==='jawaban')window._pertanyaan[idx].jawaban=parseInt(val);
      else if(field.startsWith('pilihan_')){const i=parseInt(field.split('_')[1]);window._pertanyaan[idx].pilihan[i]=val;}
    };

    window.simpanKuis = async()=>{
      const judul=document.getElementById('kuisJudul').value.trim();
      const durasi=parseInt(document.getElementById('kuisDurasi').value)||30;
      if(!judul)return toast('⚠️ Isi judul kuis dulu');
      const valid=window._pertanyaan.filter(p=>p&&p.soal.trim()&&p.pilihan.some(x=>x.trim()));
      if(valid.length===0)return toast('⚠️ Tambahkan minimal 1 soal');
      const kuisRef=await addDoc(collection(db,'pertemuan',_prt.id,'kuis'),{judul,durasi,createdAt:serverTimestamp()});
      for(const p of valid){ await addDoc(collection(db,'pertemuan',_prt.id,'kuis',kuisRef.id,'pertanyaan'),p); }
      toast('✅ Kuis berhasil dibuat!');
      await renderKuisTab();

    window.hapusKuis=async(kuisId)=>{ if(!confirm('Hapus kuis ini?'))return; await deleteDoc(doc(db,'pertemuan',_prt.id,'kuis',kuisId)); toast('🗑️ Kuis dihapus'); await renderKuisTab(); };

    window.mulaiKuis=async(kuisId,judulKuis,durasi)=>{
      const pertSnap=await getDocs(collection(db,'pertemuan',_prt.id,'kuis',kuisId,'pertanyaan'));
      const soalList=[];
      pertSnap.forEach(d=>soalList.push({id:d.id,...d.data()}));
      if(soalList.length===0)return toast('⚠️ Kuis ini belum memiliki soal');
      let jawabanMhs=new Array(soalList.length).fill(null);
      let timeLeft=durasi*60;
      let timerInterval=null;

      const renderKuisModal=()=>{
        const menit=Math.floor(timeLeft/60).toString().padStart(2,'0');
        const detik=(timeLeft%60).toString().padStart(2,'0');
        const timerColor=timeLeft<60?'color:#dc2626':'color:var(--p)';
        let soalHtml=soalList.map((s,i)=>`
          <div class="soal-card" style="margin-bottom:12px">
            <div style="font-weight:600;font-size:14px;margin-bottom:10px">${i+1}. ${s.soal}</div>
            ${(s.pilihan||[]).map((p,j)=>`
              <label style="display:flex;align-items:center;gap:8px;padding:8px;border:1.5px solid ${jawabanMhs[i]===j?'var(--p)':'var(--border)'};border-radius:8px;margin-bottom:6px;cursor:pointer;background:${jawabanMhs[i]===j?'var(--pl)':'#fff'};transition:all .15s">
                <input type="radio" name="soal_${i}" value="${j}" ${jawabanMhs[i]===j?'checked':''} onchange="pilihJawaban(${i},${j})" style="accent-color:var(--p)">
                <span>${['A','B','C','D'][j]}. ${p}</span>
              </label>`).join('')}
          </div>`).join('');
        const content=`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:12px;background:var(--pl);border-radius:10px">
            <div style="font-size:13px;font-weight:600">${judulKuis}</div>
            ${durasi>0?`<div style="font-size:16px;font-weight:800;${timerColor}" id="kuisTimer">⏱️ ${menit}:${detik}</div>`:''}
          </div>
          <div id="soalContainer">${soalHtml}</div>
          <button class="btn-submit" onclick="kumpulKuis('${kuisId}',${JSON.stringify(soalList).replace(/'/g,"\\'")})" style="margin-top:8px">📤 Kumpulkan Jawaban</button>`;
        openModal('Kuis', content);
      };

      window.pilihJawaban=(soalIdx,pilihanIdx)=>{
        jawabanMhs[soalIdx]=pilihanIdx;
        document.querySelectorAll(`[name="soal_${soalIdx}"]`).forEach(r=>{
          const label=r.closest('label'); const j=parseInt(r.value);
          if(label){label.style.borderColor=jawabanMhs[soalIdx]===j?'var(--p)':'var(--border)';label.style.background=jawabanMhs[soalIdx]===j?'var(--pl)':'#fff';}
        });
      };

      window.kumpulKuis=async(kuisId,soalListData)=>{
        if(timerInterval)clearInterval(timerInterval);
        let benar=0;
        soalListData.forEach((s,i)=>{if(jawabanMhs[i]===s.jawaban)benar++;});
        const total=soalListData.length;
        const nilai=Math.round((benar/total)*100);
        await setDoc(doc(db,'pertemuan',_prt.id,'kuis',kuisId,'jawaban',user.id),{
          mahasiswaId:user.id,nama:user.nama,nim:user.nim||'-',jawaban:jawabanMhs,benar,total,nilai,waktu:serverTimestamp()
        });
        closeModal();
        toast(`✅ Selesai! Nilai: ${nilai} (${benar}/${total} benar)`);
        await renderKuisTab();
      };

      renderKuisModal();
      if(durasi>0){
        timerInterval=setInterval(()=>{
          timeLeft--;
          const el=document.getElementById('kuisTimer');
          if(el){const m=Math.floor(timeLeft/60).toString().padStart(2,'0');const s=(timeLeft%60).toString().padStart(2,'0');el.textContent=`⏱️ ${m}:${s}`;el.style.color=timeLeft<60?'#dc2626':'var(--p)';}
          if(timeLeft<=0){clearInterval(timerInterval);toast('⏰ Waktu habis! Jawaban dikumpulkan otomatis.');window.kumpulKuis(kuisId,soalList);}
        },1000);
      }
    };

        html=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
          <div style="background:var(--pl);border-radius:10px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:var(--p)">${list.length}</div><div style="font-size:12px;color:var(--muted)">Peserta</div></div>

          </div>`).join('')}</div>`;
      }
      openModal('Hasil: '+judulKuis, html);
    };

            <div style="display:flex;gap:6px;align-items:center">

          `<div style="font-size:48px;margin-bottom:12px">📋</div><div style="font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px">Belum Diabsen</div><div style="font-size:13px;color:var(--muted)">Absensi akan dicatat oleh dosen</div>`}
        </div>
        <div class="card" style="margin-top:12px">
          <div style="font-size:13px;font-weight:700;margin-bottom:10px">Rekap Kehadiranmu</div>
          <div id="rekapMhs"><div class="loading"><div class="spin"></div></div></div>
        </div>`;
        const allAbsSnap=await getDocs(query(collection(db,'absensi'),where('mahasiswaId','==',user.id)));
        const allAbs=[];allAbsSnap.forEach(d=>allAbs.push(d.data()));
        const hadir=allAbs.filter(a=>a.status==='hadir').length;
        const tidak=allAbs.filter(a=>a.status==='tidak').length;
        const izin=allAbs.filter(a=>a.status==='izin').length;
        const totalDiabsen=allAbs.length;

          <div><div style="font-size:20px;font-weight:800;color:var(--r)">${tidak}</div><div style="font-size:11px;color:var(--muted)">Tidak</div></div>
          <div><div style="font-size:20px;font-weight:800;color:var(--a)">${izin}</div><div style="font-size:11px;color:var(--muted)">Izin</div></div>
          <div><div style="font-size:20px;font-weight:800;color:var(--p)">${pct}%</div><div style="font-size:11px;color:var(--muted)">Kehadiran</div></div>
        </div>`;}

    window.updateAbsensi=async(mhsId,nama,status)=>{
      if(!status)return;
      const existing=await getDocs(query(collection(db,'absensi'),where('mahasiswaId','==',mhsId),where('pertemuanId','==',_prt.id)));
      if(existing.empty){await addDoc(collection(db,'absensi'),{mahasiswaId:mhsId,namaMhs:nama,pertemuanId:_prt.id,pertemuanKe:_prt.pertemuanKe,status,updatedAt:serverTimestamp()});}
      else{await updateDoc(doc(db,'absensi',existing.docs[0].id),{status,updatedAt:serverTimestamp()});}
      toast('✅ Absensi diperbarui');await renderAbsensiTab();
    };

    window.absensiSemuaHadir=async()=>{
      if(!confirm('Tandai semua mahasiswa hadir?'))return;
      const mhsSnap=await getDocs(query(collection(db,'users'),where('role','==','mahasiswa')));
      const batch=[];mhsSnap.forEach(d=>batch.push({id:d.id,...d.data()}));
      for(const m of batch){
        const existing=await getDocs(query(collection(db,'absensi'),where('mahasiswaId','==',m.id),where('pertemuanId','==',_prt.id)));
        if(existing.empty){await addDoc(collection(db,'absensi'),{mahasiswaId:m.id,namaMhs:m.nama,pertemuanId:_prt.id,pertemuanKe:_prt.pertemuanKe,status:'hadir',updatedAt:serverTimestamp()});}
        else{await updateDoc(doc(db,'absensi',existing.docs[0].id),{status:'hadir',updatedAt:serverTimestamp()});}
      }
      toast('✅ Semua mahasiswa ditandai hadir');await renderAbsensiTab();
    };

    // ── DATA MAHASISWA ─────────────────────────────────

      setContent(`
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
          <div class="section-title" style="flex:1">${list.length} Mahasiswa Terdaftar</div>

            <input class="inp" id="cariMhs" placeholder="Cari nama / NIM..." style="margin:0;padding-left:36px;width:220px" oninput="filterMhs()">
            <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted)">${svgIcon('search')}</span>
          </div>
        </div>
        <div class="mhs-table-wrap">
          <table class="mhs-table" id="mhsTable">
            <thead><tr><th>No</th><th>Nama</th><th>NIM</th><th>Prodi</th><th>Sem</th><th>Kehadiran</th><th>Nilai</th><th>Aksi</th></tr></thead>
            <tbody id="mhsTbody">
              ${list.map((m,i)=>{
                const abs=absMap[m.id]||[];const hadir=abs.filter(s=>s==='hadir').length;const total=abs.length;
                const pct=total>0?Math.round(hadir/total*100):0;const nilai=nilaiMap[m.id]?.nilaiAkhir||'-';

                  <td style="color:var(--muted)">${i+1}</td>
                  <td><div style="font-weight:600">${m.nama||'-'}</div><div style="font-size:11px;color:var(--muted)">${m.email||''}</div></td>
                  <td><span class="badge" style="background:var(--pl);color:var(--p)">${m.nim||'-'}</span></td>
                  <td style="font-size:12px">${m.prodi||'-'}</td>
                  <td style="text-align:center">${m.semester||'-'}</td>
                  <td><div style="font-weight:700;color:${pctColor}">${pct}%</div><div style="font-size:11px;color:var(--muted)">${hadir}/${total} pertemuan</div></td>
                  <td><span style="font-weight:700;font-size:16px;color:${nilai!=='-'?(parseInt(nilai)>=70?'var(--g)':parseInt(nilai)>=50?'var(--a)':'var(--r)'):'var(--muted)'}">${nilai}</span></td>

        <div class="card" style="padding:12px"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Semester</div><div style="font-weight:700">${m.semester||'-'}</div></div>
        <div class="card" style="padding:12px;grid-column:1/-1"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Program Studi</div><div style="font-weight:700">${m.prodi||'-'}</div></div>

        <div style="font-size:13px;font-weight:700;margin-bottom:10px">📋 Rekap Kehadiran</div>

          <div><div style="font-size:22px;font-weight:800;color:var(--g)">${hadir}</div><div style="font-size:11px;color:var(--muted)">Hadir</div></div>
          <div><div style="font-size:22px;font-weight:800;color:var(--r)">${tidak}</div><div style="font-size:11px;color:var(--muted)">Tidak</div></div>
          <div><div style="font-size:22px;font-weight:800;color:var(--a)">${izin}</div><div style="font-size:11px;color:var(--muted)">Izin</div></div>
          <div><div style="font-size:22px;font-weight:800;color:${pct>=75?'var(--g)':pct>=50?'var(--a)':'var(--r)'}">${pct}%</div><div style="font-size:11px;color:var(--muted)">Kehadiran</div></div>
        </div>
      </div>
      <div class="card">
        <div style="font-size:13px;font-weight:700;margin-bottom:10px">🎓 Nilai</div>

          <input class="inp" id="editNilaiUAS_${mhsId}" placeholder="UAS" value="${n.nilaiUAS||''}" style="margin:0">
          <input class="inp" id="editNilaiAkhir_${mhsId}" placeholder="Akhir" value="${n.nilaiAkhir||''}" style="margin:0">

    window.simpanNilaiDariDetail=async(mhsId)=>{
      const uts=document.getElementById('editNilaiUTS_'+mhsId)?.value.trim();
      const uas=document.getElementById('editNilaiUAS_'+mhsId)?.value.trim();
      const akhir=document.getElementById('editNilaiAkhir_'+mhsId)?.value.trim();

    async function renderNilaiDsn(){
      const snap=await getDocs(query(collection(db,'users'),where('role','==','mahasiswa')));
      const list=[];snap.forEach(d=>list.push({id:d.id,...d.data()}));list.sort((a,b)=>(a.nim||'').localeCompare(b.nim||''));

      const uas=parseFloat(document.getElementById('n_uas_'+id)?.value)||0;
      const el=document.getElementById('n_akhir_'+id);
      if(el&&!el.value)el.value=Math.round(uts*0.4+uas*0.6);
    };

    window.simpanNilai=async(mhsId)=>{
      const uts=document.getElementById('n_uts_'+mhsId)?.value.trim();
      const uas=document.getElementById('n_uas_'+mhsId)?.value.trim();
      const akhir=document.getElementById('n_akhir_'+mhsId)?.value.trim();
      await setDoc(doc(db,'nilai_akhir',mhsId),{nilaiUTS:uts?parseFloat(uts):null,nilaiUAS:uas?parseFloat(uas):null,nilaiAkhir:akhir?parseFloat(akhir):null,updatedAt:serverTimestamp()},{merge:true});

    async function renderAbsensiMhs(){

          <div class="stat-card" style="--c:var(--r)"><div class="stat-ico" style="background:var(--rb);color:var(--r)">${svgIcon('x')}</div><div class="stat-val">${Object.values(absMap).filter(s=>s==='tidak').length}</div><div class="stat-lbl">Tidak Hadir</div></div>

          <div class="stat-card" style="--c:var(--p)"><div class="stat-ico" style="background:var(--pl);color:var(--p)">${svgIcon('bar-chart-2')}</div><div class="stat-val" style="color:${pct>=75?'var(--g)':pct>=50?'var(--a)':'var(--r)'}">${pct}%</div><div class="stat-lbl">Kehadiran</div></div>

      await addDoc(collection(db,'notifikasi'),{title:judul,pesan:isi,createdAt:serverTimestamp()});

      toast('✅ Notifikasi terkirim!');await loadNotif();

    async function loadNotif(){
      const list=[];
      try{const snap=await getDocs(query(collection(db,'notifikasi'),orderBy('createdAt','desc')));snap.forEach(d=>list.push({id:d.id,...d.data()}));}catch(e){console.error('Gagal memuat notifikasi:',e);}
      const el=document.getElementById('listNotif');if(!el)return;
      if(list.length===0){el.innerHTML=`<div class="empty"><div class="empty-ico">🔔</div><h3>Belum ada notifikasi</h3></div>`;return;}
      el.innerHTML=list.map(n=>{
        const waktu=n.createdAt?.toDate?n.createdAt.toDate().toLocaleDateString('id-ID',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';
        return `<div class="card" style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div><div style="font-weight:700;font-size:14px;margin-bottom:4px">🔔 ${n.title||''}</div><div style="font-size:13px;color:var(--ink2)">${n.pesan||''}</div></div>

          </div>
          ${waktu?`<div style="font-size:11px;color:var(--muted);margin-top:6px">${waktu}</div>`:''}
        </div>`;
      }).join('');
    }

    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 60px 20px; color: var(--muted); font-size: 13px; }
    .spin { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--p); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-ico { font-size: 48px; margin-bottom: 12px; }
    .empty h3 { font-size: 16px; font-weight: 700; color: var(--ink2); margin-bottom: 6px; }
    .empty p { font-size: 13px; }
    @media(max-width: 768px){
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 45; transform: translateX(-100%); width: 260px; }
      .sidebar.open { transform: translateX(0); box-shadow: 0 0 40px rgba(0,0,0,.5); }
      .bottom-nav { display: block; }
      .content { padding: 16px; padding-bottom: calc(var(--bot) + 16px); }
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .qa-grid { grid-template-columns: 1fr 1fr; }
      .prt-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .materi-actions { flex-direction: column; }
      .toast { bottom: calc(var(--bot) + 16px); }
      .mhs-table th, .mhs-table td { padding: 10px 10px; }
    }
    @media(max-width: 480px){
      .prt-grid { grid-template-columns: 1fr 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
    .ql-toolbar { border-radius: 10px 10px 0 0 !important; border-color: var(--border) !important; background: var(--bg) !important; }
    .ql-container { border-radius: 0 0 10px 10px !important; border-color: var(--border) !important; font-family: 'Inter', system-ui, sans-serif !important; font-size: 14px !important; }
    .ql-editor { min-height: 200px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-brand-logo">🎓</div>
      <h1>EduCampus</h1>
      <p>Platform pembelajaran digital</p>
    </div>
    <div class="login-card">
      <div class="role-tabs">
        <div class="role-tab on" id="tabM" onclick="setRole('mahasiswa')">🎓 Mahasiswa</div>
        <div class="role-tab" id="tabD" onclick="setRole('dosen')">👨‍🏫 Dosen</div>
      </div>
      <div class="auth-msg" id="authErr"></div>
      <div class="auth-msg" id="authOk"></div>
      <div class="dosen-info" id="dosenInfo"><strong>👨‍🏫 Akun Dosen</strong> — Login dengan akun yang telah disiapkan admin.</div>
      <div id="fLogin">
        <input class="inp" id="lEmail" placeholder="Alamat email" type="email" autocomplete="email">
        <input class="inp" id="lPass" placeholder="Password" type="password" autocomplete="current-password">
        <button class="btn-submit" id="loginBtn" onclick="doLogin()">Masuk</button>
        <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted)" id="switchLink">
          Belum punya akun? <span style="color:var(--p);font-weight:600;cursor:pointer" onclick="toggleReg()">Daftar sekarang</span>
        </div>
      </div>
      <div id="fReg" style="display:none">
        <input class="inp" id="rNama" placeholder="Nama Lengkap">
        <input class="inp" id="rNim" placeholder="NIM">
        <input class="inp" id="rEmail" placeholder="Alamat email" type="email">
        <input class="inp" id="rPass" placeholder="Password (min. 6 karakter)" type="password">
        <input class="inp" id="rSem" placeholder="Semester" type="number" min="1" max="14">
        <input class="inp" id="rProdi" placeholder="Program Studi">
        <button class="btn-submit" onclick="doRegister()">Buat Akun</button>
        <div style="text-align:center;margin-top:14px;font-size:13px;color:var(--muted);cursor:pointer" onclick="toggleReg()">
          Sudah punya akun? <span style="color:var(--p);font-weight:600">Masuk</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sb-brand">🎓 EduCampus</div>
    <div class="sb-user">
      <div class="sb-av" id="sbAv">?</div>
      <div style="min-width:0">
        <div class="sb-uname" id="sbName">...</div>
        <div id="sbRole"></div>
      </div>
    </div>
    <div class="sb-nav" id="navMenu"></div>
  </div>

  <div class="main">
    <header class="topbar">
      <button onclick="openSidebar()" style="background:none;border:none;cursor:pointer;padding:4px;color:var(--ink);display:none" id="menuBtn">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div id="topActions"></div>
    </header>
    <div class="content" id="content"></div>
  </div>

  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBox"></div>
</div>
<div class="toast" id="toast"></div>
<div id="sbOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:44" onclick="closeSidebar()"></div>

<script>
  if(window.innerWidth<=768){
    document.getElementById('menuBtn').style.display='block';
  }
</script>
</body>
</html>
