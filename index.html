    function uploadToCloudinary(file, subFolder, onProgress) {
      return new Promise((resolve, reject) => {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        formData.append('folder', subFolder);
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`);
        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable && onProgress) onProgress(Math.round((e.loaded / e.total) * 100));
        };
        xhr.onload = () => {
          try {
            const res = JSON.parse(xhr.responseText);
            if (xhr.status >= 200 && xhr.status < 300 && res.secure_url) {
              resolve({
                fileUrl: res.secure_url.replace('/upload/', '/upload/fl_attachment/'),
                viewUrl: res.secure_url,
                fileId: res.public_id,
                namaFile: file.name
              });
            } else reject(new Error(res.error?.message || 'Upload gagal'));
          } catch (e) { reject(new Error('Respons tidak valid dari Cloudinary')); }
        };
        xhr.onerror = () => reject(new Error('Koneksi gagal saat upload'));
        xhr.send(formData);
      });
    }

    window.setRole = (r)=>{

      document.getElementById('tabD').classList.toggle('on',r==='dosen');
      document.getElementById('switchLink').style.display=r==='dosen'?'none':'block';

      if(r==='dosen'&&showReg){showReg=false;document.getElementById('fLogin').style.display='block';document.getElementById('fReg').style.display='none';}
      clearMsg();
    };
    window.toggleReg=()=>{ if(authRole==='dosen')return; showReg=!showReg; document.getElementById('fLogin').style.display=showReg?'none':'block'; document.getElementById('fReg').style.display=showReg?'block':'none'; clearMsg(); };
    function clearMsg(){ ['authErr','authOk'].forEach(id=>{ const e=document.getElementById(id); if(e) e.style.display='none'; }); }
    window.doLogin=async()=>{
      clearMsg();
      const email=document.getElementById('lEmail').value.trim(), pw=document.getElementById('lPass').value;
      if(!email||!pw) return showErr('Isi email dan password');
      const btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent='Masuk...';
      try { await signInWithEmailAndPassword(auth,email,pw); }
      catch(e) { showErr('Login gagal: '+(e.code==='auth/invalid-credential'?'Email atau password salah':e.message)); btn.disabled=false; btn.textContent='Masuk'; }
    };
    window.doRegister=async()=>{
      clearMsg();
      const nama=v('rNama'),nim=v('rNim'),email=v('rEmail'),pw=v('rPass'),sem=v('rSem'),prodi=v('rProdi');
      if(!nama||!nim||!email||!pw) return showErr('Semua field wajib diisi');
      if(pw.length<6) return showErr('Password minimal 6 karakter');
      try {
        const cred=await createUserWithEmailAndPassword(auth,email,pw);
        await setDoc(doc(db,'users',cred.user.uid),{nama,nim,email,role:'mahasiswa',semester:parseInt(sem)||1,prodi,createdAt:new Date()});
        showOk('Akun berhasil dibuat! Silakan login.'); toggleReg();
      } catch(e) { showErr('Gagal: '+e.message); }
    };
    window.doLogout=async()=>{ if(_unsubNotif){_unsubNotif();_unsubNotif=null;} await signOut(auth); };

              <div class="qa-card" onclick="go('absensi_mhs')"><div class="qa-ico" style="background:#ecfdf5;color:#059669">${svgIcon('check-square')}</div><div>Absensi Saya</div></div>
              <div class="qa-card" onclick="go('nilai_mhs')"><div class="qa-ico" style="background:#fffbeb;color:#d97706">${svgIcon('bar-chart-2')}</div><div>Nilai Saya</div></div>
              <div class="qa-card" onclick="go('notifikasi')"><div class="qa-ico" style="background:#f5f3ff;color:#7c3aed">${svgIcon('bell')}</div><div>Notifikasi</div></div>

    function getGreeting(){
      const h=new Date().getHours();
      if(h<11)return'Selamat Pagi 🌤';
      if(h<15)return'Selamat Siang ☀️';
      if(h<18)return'Selamat Sore 🌇';
      return'Selamat Malam 🌙';
    }

    async function renderPertemuan(){
      const isDsn = user.role === 'dosen';
      const snap=await getDocs(collection(db,'pertemuan'));
      const prts=[];snap.forEach(d=>prts.push({id:d.id,...d.data()}));
      prts.sort((a,b)=>(a.pertemuanKe||0)-(b.pertemuanKe||0));
      if(prts.length===0){
        setContent(`<div class="empty"><div class="empty-ico">📅</div><h3>Belum ada pertemuan</h3><p>${isDsn?'Tambahkan pertemuan melalui Firebase Console.':'Belum ada materi yang tersedia.'}</p></div>`);
        return;
      }
      setContent(`
        <div class="section-title" style="margin-bottom:12px">${prts.length} Pertemuan tersedia</div>
        <div class="prt-grid">${prts.map(p=>`
          <div class="prt-card" onclick="bukaPrt('${p.id}')">
            <div class="prt-num">Pertemuan ${p.pertemuanKe}</div>
            <div class="prt-topik">${p.topik||'—'}</div>
            <div class="prt-arrow">${svgIcon('arrow-left')}</div>
          </div>`).join('')}
        </div>`);
    }

    window.bukaPrt=async(prtId)=>{
      const snap=await getDoc(doc(db,'pertemuan',prtId));
      if(snap.exists()){_prt={id:prtId,...snap.data()};renderPrtDetail(_prt,'materi');}
    };

    function renderPrtDetail(p,tab){
      const tabs=[
        {k:'materi',l:'Materi'},
        {k:'tugas',l:'Tugas'},
        {k:'kuis',l:'Kuis'},
        {k:'absensi',l:'Absensi'},
      ];
      setContent(`
        <div class="prt-detail-header">
          <button class="btn-back" onclick="go('pertemuan')">${svgIcon('arrow-left')} Kembali</button>
          <div>
            <div class="prt-detail-badge">Pertemuan ${p.pertemuanKe}</div>
            <div class="prt-detail-title">${p.topik||''}</div>
          </div>
        </div>
        <div class="dtabs">${tabs.map(t=>`<div class="dtab${t.k===tab?' on':''}" data-tab="${t.k}" onclick="loadTab('${t.k}')">${t.l}</div>`).join('')}</div>
        <div id="tabContent"><div class="loading"><div class="spin"></div><span>Memuat...</span></div></div>`);
      loadTab(tab);
    }

    window.loadTab=async(tab)=>{
      if(!_prt)return;
      document.querySelectorAll('.dtab').forEach(t=>t.classList.toggle('on', t.dataset.tab===tab));
      const tc=document.getElementById('tabContent');
      if(!tc)return;
      if(tab==='materi') await renderMateriTab();
      else if(tab==='tugas') await renderTugasTab();
      else if(tab==='kuis') await renderKuisTab();
      else if(tab==='absensi') await renderAbsensiTab();
    };

    async function renderMateriTab(){
      const isDsn = user.role === 'dosen';
      const tc = document.getElementById('tabContent');
      if(!tc) return;
      let items = [];
      try {
        const snap = await getDocs(collection(db,'pertemuan',_prt.id,'materi'));
        snap.forEach(d => items.push({id:d.id,...d.data()}));
        items.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
      } catch(e) {
        tc.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><h3>Gagal memuat</h3><p>${e.message}</p></div>`;
        return;
      }
      let html = `<div class="materi-list" id="materi-list">`;
      if(items.length === 0){
        html += `<div class="empty"><div class="empty-ico">📄</div><h3>Belum ada materi</h3><p>${isDsn?'Tambahkan materi di bawah.':'Dosen belum menambahkan materi.'}</p></div>`;
      } else {
        items.forEach(m=>{
          if(m.tipe==='file'){
            const icon = getFileIcon(m.namaFile||'');
            html += `
              <div class="materi-item">
                <div class="materi-icon-wrap">${icon}</div>
                <div class="materi-info">
                  <div class="materi-judul">${m.judul}</div>
                  <div class="materi-meta">${m.namaFile||''} ${m.ukuran?'· '+m.ukuran:''}</div>
                </div>
                <div class="materi-actions">
                  <a href="${m.fileUrl}" target="_blank" class="btn-action btn-primary">${svgIcon('download')} Unduh</a>
                  ${m.viewUrl?`<a href="${m.viewUrl}" target="_blank" class="btn-action btn-secondary">👁️ Lihat</a>`:''}
                  ${isDsn?`<button class="btn-action btn-danger" onclick="hapusMateri('${m.id}','${m.fileId||''}')">${svgIcon('trash')}</button>`:''}
                </div>
              </div>`;
          } else if(m.tipe==='teks'){
            html += `
              <div class="materi-item">
                <div class="materi-icon-wrap">📝</div>
                <div class="materi-info">
                  <div class="materi-judul">${m.judul}</div>
                  <div class="materi-meta">Konten teks</div>
                </div>
                <div class="materi-actions">
                  <button class="btn-action btn-primary" onclick="bacaMateriTeks('${m.id}')">${svgIcon('book-open')} Baca</button>
                  ${isDsn?`
                    <button class="btn-action btn-secondary" onclick="editMateriTeks('${m.id}')">${svgIcon('edit')} Edit</button>
                    <button class="btn-action btn-danger" onclick="hapusMateri('${m.id}','')">${svgIcon('trash')}</button>`:''}
                </div>
              </div>`;
          }
        });
      }
      html += `</div>`;
      if(isDsn){
        html += `
          <div class="add-materi-card">
            <div class="add-materi-title">${svgIcon('plus')} Tambah Materi</div>
            <div class="tipe-tabs">
              <div class="tipe-tab on" id="tipeFile" onclick="switchTipe('file')">${svgIcon('upload')} Upload File</div>
              <div class="tipe-tab" id="tipeTeks" onclick="switchTipe('teks')">${svgIcon('file-text')} Konten Teks</div>
            </div>
            <div id="formFile">
              <input class="inp" id="judulFile" placeholder="Judul materi...">
              <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-ico">${svgIcon('upload')}</div>
                <div class="upload-txt">Klik untuk pilih file</div>
                <div class="upload-sub">PDF, PPT, Gambar, Video — semua format didukung</div>
                <input type="file" id="fileInput" style="display:none" accept="*/*" onchange="previewFile(this)">
              </div>
              <div id="filePreview" style="display:none" class="file-preview-box"></div>
              <div id="uploadProgress" style="display:none" class="upload-progress">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-txt" id="progressTxt">Mengupload...</div>
              </div>
              <button class="btn-submit" id="submitFileBtn" onclick="uploadMateriFile()">Upload & Simpan</button>
            </div>
            <div id="formTeks" style="display:none">
              <input class="inp" id="judulTeks" placeholder="Judul materi...">
              <div id="quillEditor" style="height:280px"></div>
              <button class="btn-submit" style="margin-top:12px" onclick="simpanMateriTeks()">Simpan Materi</button>
            </div>
          </div>`;
      }
      tc.innerHTML = html;
      if(isDsn){
        _quill = new Quill('#quillEditor', {
          theme: 'snow',
          placeholder: 'Tulis konten materi di sini...',
          modules: { toolbar: [
            [{header:[1,2,3,false]}],
            ['bold','italic','underline','strike'],
            [{color:[]},{background:[]}],
            [{list:'ordered'},{list:'bullet'}],
            ['blockquote','code-block'],
            ['link','image'],
            ['clean']
          ]}
        });
      }
    }

    function getFileIcon(nama){
      const ext=(nama.split('.').pop()||'').toLowerCase();
      if(ext==='pdf') return '📄';
      if(['ppt','pptx'].includes(ext)) return '📊';
      if(['jpg','jpeg','png','gif','webp'].includes(ext)) return '🖼️';
      if(['mp4','mov','avi','mkv'].includes(ext)) return '🎬';
      if(['doc','docx'].includes(ext)) return '📝';
      if(['xls','xlsx'].includes(ext)) return '📈';
      if(['zip','rar'].includes(ext)) return '🗜️';
      return '📎';
    }

    window.switchTipe=(tipe)=>{
      document.getElementById('tipeFile').classList.toggle('on',tipe==='file');
      document.getElementById('tipeTeks').classList.toggle('on',tipe==='teks');
      document.getElementById('formFile').style.display=tipe==='file'?'block':'none';
      document.getElementById('formTeks').style.display=tipe==='teks'?'block':'none';
    };

    window.previewFile=(input)=>{
      const file=input.files[0]; if(!file)return;
      const size=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' MB':(file.size/1024).toFixed(0)+' KB';
      const preview=document.getElementById('filePreview');
      preview.style.display='flex';
      preview.innerHTML=`<span style="font-size:28px">${getFileIcon(file.name)}</span><div><div style="font-weight:600;font-size:14px">${file.name}</div><div style="font-size:12px;color:var(--muted)">${size}</div></div>`;
      document.getElementById('uploadArea').style.display='none';
    };

    window.uploadMateriFile=async()=>{
      const judul=document.getElementById('judulFile').value.trim();
      const fileInput=document.getElementById('fileInput');
      const file=fileInput.files[0];
      if(!judul) return toast('⚠️ Isi judul materi dulu');
      if(!file) return toast('⚠️ Pilih file dulu');
      const size=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' MB':(file.size/1024).toFixed(0)+' KB';
      document.getElementById('uploadProgress').style.display='block';
      document.getElementById('submitFileBtn').disabled=true;
      try {
        const result = await window._uploadToDrive(file, 'materi_'+_prt.id, (pct)=>{
          document.getElementById('progressFill').style.width=pct+'%';
          document.getElementById('progressTxt').textContent=`Mengupload ${pct}%...`;
        });
        await addDoc(collection(db,'pertemuan',_prt.id,'materi'),{
          judul, tipe:'file', fileUrl:result.fileUrl, viewUrl:result.viewUrl,
          fileId:result.fileId, namaFile:file.name, ukuran:size, createdAt:serverTimestamp()
        });
        toast('✅ Materi berhasil diupload!');
        await renderMateriTab();
      } catch(e) {
        toast('❌ Upload gagal: '+e.message);
        document.getElementById('uploadProgress').style.display='none';
        document.getElementById('submitFileBtn').disabled=false;
      }
    };

    window.simpanMateriTeks=async()=>{
      const judul=document.getElementById('judulTeks').value.trim();
      if(!judul) return toast('⚠️ Isi judul materi dulu');
      if(!_quill) return;
      if(_quill.getText().trim().length===0) return toast('⚠️ Isi konten materi dulu');
      const konten=_quill.root.innerHTML;
      await addDoc(collection(db,'pertemuan',_prt.id,'materi'),{judul,tipe:'teks',konten,createdAt:serverTimestamp()});
      toast('✅ Materi teks tersimpan!');
      await renderMateriTab();
    };

    window.bacaMateriTeks=async(materiId)=>{
      const snap=await getDoc(doc(db,'pertemuan',_prt.id,'materi',materiId));
      if(!snap.exists())return;
      const m=snap.data();
      openModal(m.judul,`<div class="materi-konten ql-editor" style="padding:0;border:none">${m.konten}</div>`);
    };

    window.editMateriTeks=async(materiId)=>{
      const snap=await getDoc(doc(db,'pertemuan',_prt.id,'materi',materiId));
      if(!snap.exists())return;
      const m=snap.data();
      openModal('Edit: '+m.judul,`
        <input class="inp" id="editJudul" value="${m.judul.replace(/"/g,'&quot;')}">
        <div id="editQuill" style="height:280px"></div>
        <button class="btn-submit" style="margin-top:12px" onclick="saveEditTeks('${materiId}')">Simpan Perubahan</button>
      `);
      setTimeout(()=>{
        const eq=new Quill('#editQuill',{theme:'snow',modules:{toolbar:[
          [{header:[1,2,3,false]}],['bold','italic','underline'],
          [{list:'ordered'},{list:'bullet'}],['link'],['clean']
        ]}});
        eq.root.innerHTML=m.konten;
        window._editQuill=eq;
      },150);
    };

    window.saveEditTeks=async(materiId)=>{
      const judul=document.getElementById('editJudul').value.trim();
      if(!judul||!window._editQuill)return;
      await updateDoc(doc(db,'pertemuan',_prt.id,'materi',materiId),{judul,konten:window._editQuill.root.innerHTML});
      closeModal(); toast('✅ Materi diperbarui!');
      await renderMateriTab();
    };

    window.hapusMateri=async(materiId, fileId)=>{
      if(!confirm('Hapus materi ini?'))return;
      if(fileId) await window._deleteFromDrive(fileId);
      await deleteDoc(doc(db,'pertemuan',_prt.id,'materi',materiId));
      toast('🗑️ Materi dihapus');
      await renderMateriTab();
    };

    // ── TUGAS TAB ─────────────────────────────────────────────

        const snap = await getDocs(collection(db,'pertemuan',_prt.id,'tugas'));
        snap.forEach(d => tugasList.push({id:d.id,...d.data()}));
        tugasList.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));

        tc.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><h3>Gagal memuat tugas</h3><p>${e.message}</p></div>`;

            </div>

      } else {

                  <div class="kumpul-info" id="kumpulInfo_${t.id}">
                    <div style="font-size:12px;color:var(--g);font-weight:600">✅ Tugas sudah dikumpulkan</div>
                    ${kumpulData?.namaFile?`<div style="font-size:12px;color:var(--muted);margin-top:4px">📎 ${kumpulData.namaFile}</div>`:''}
                    ${kumpulData?.fileUrl?`<a href="${kumpulData.fileUrl}" target="_blank" class="btn-action btn-primary" style="margin-top:8px;display:inline-flex">${svgIcon('download')} Lihat File Saya</a>`:''}
                    ${kumpulData?.catatan?`<div style="font-size:12px;color:var(--ink2);margin-top:4px">"${kumpulData.catatan}"</div>`:''}
                    ${bisaEdit?`<div><button class="btn-action btn-secondary" style="margin-top:10px" onclick="toggleEditTugas('${t.id}')">${svgIcon('edit')} Edit Jawaban</button><div style="font-size:11px;color:var(--muted);margin-top:6px">Kamu masih bisa mengubah jawaban sebelum batas waktu berakhir.</div></div>`:`<div style="font-size:11px;color:var(--muted);margin-top:8px">Waktu pengumpulan telah berakhir, jawaban tidak bisa diubah lagi.</div>`}
                  </div>`:''}
                <div class="kumpul-form" id="kumpulForm_${t.id}" style="${sudahKumpul?'display:none':''}">
                  <textarea class="inp" id="kumpulCatatan_${t.id}" placeholder="Catatan / komentar (opsional)..." style="resize:vertical;min-height:60px;margin-top:10px">${sudahKumpul?catatanLama:''}</textarea>
                  <div style="margin-bottom:10px">
                    <label class="upload-area" style="padding:16px;cursor:pointer;display:flex;align-items:center;gap:10px;justify-content:center" for="kumpulFile_${t.id}">
                      ${svgIcon('upload')}<span id="kumpulFileLabel_${t.id}">${namaFileLama?'📎 '+namaFileLama+' (klik untuk ganti file)':'Lampirkan file tugas (opsional)'}</span>
                      <input type="file" id="kumpulFile_${t.id}" style="display:none" onchange="previewKumpulFile('${t.id}',this)">
                    </label>
                  </div>
                  <div id="kumpulProgress_${t.id}" style="display:none" class="upload-progress">
                    <div class="progress-bar"><div class="progress-fill" id="kumpulProgressFill_${t.id}"></div></div>
                    <div class="progress-txt" id="kumpulProgressTxt_${t.id}">Mengupload...</div>
                  </div>
                  <div style="display:flex;gap:8px">
                    <button class="btn-submit" ${terlambat?'style="background:#d97706"':''} onclick="kumpulTugas('${t.id}','${fileUrlLama}','${namaFileLamaEsc}','${fileIdLama}','${viewUrlLama}')">
                      ${sudahKumpul?'💾 Simpan Perubahan':(terlambat?'⏰ Kumpul (Terlambat)':'📤 Kumpulkan Tugas')}
                    </button>
                    ${sudahKumpul?`<button class="btn-action btn-secondary" onclick="toggleEditTugas('${t.id}')">Batal</button>`:''}
                  </div>
                </div>
              </div>`;
          }
          html += `</div>`;
        }
      }
      tc.innerHTML = html;
    }

    window.simpanTugas=async()=>{
      const judul=document.getElementById('tugasJudul').value.trim();
      const deskripsi=document.getElementById('tugasDeskripsi').value.trim();
      const batas=document.getElementById('tugasBatas').value;
      if(!judul) return toast('⚠️ Isi judul tugas dulu');
      await addDoc(collection(db,'pertemuan',_prt.id,'tugas'),{judul,deskripsi,batasWaktu:batas||null,createdAt:serverTimestamp()});
      toast('✅ Tugas berhasil dibuat!');
      await renderTugasTab();
    };

    window.hapusTugas=async(tugasId)=>{
      if(!confirm('Hapus tugas ini?')) return;
      await deleteDoc(doc(db,'pertemuan',_prt.id,'tugas',tugasId));
      toast('🗑️ Tugas dihapus');
      await renderTugasTab();
    };

    window.previewKumpulFile=(tugasId,input)=>{
      const file=input.files[0]; if(!file)return;
      const label=document.getElementById('kumpulFileLabel_'+tugasId);
      if(label) label.textContent='📎 '+file.name;
    };

    window.toggleEditTugas=(tugasId)=>{
      const info=document.getElementById('kumpulInfo_'+tugasId);
      const form=document.getElementById('kumpulForm_'+tugasId);
      if(!form)return;
      const showForm=form.style.display==='none';
      form.style.display=showForm?'block':'none';
      if(info) info.style.display=showForm?'none':'block';
    };

    window.kumpulTugas=async(tugasId,oldFileUrl,oldNamaFile,oldFileId,oldViewUrl)=>{
      const catatanEl=document.getElementById('kumpulCatatan_'+tugasId);
      const fileInput=document.getElementById('kumpulFile_'+tugasId);
      if(!catatanEl){ toast('❌ Form tidak ditemukan, coba refresh halaman'); return; }
      const catatan=catatanEl.value.trim()||'';
      const file=fileInput?.files[0];
      const doSave=async(fileUrl,namaFile,fileId,viewUrl)=>{
        await setDoc(doc(db,'pertemuan',_prt.id,'tugas',tugasId,'pengumpulan',user.id),{
          mahasiswaId:user.id,nama:user.nama,nim:user.nim||'-',catatan,
          fileUrl:fileUrl||null,namaFile:namaFile||null,fileId:fileId||null,viewUrl:viewUrl||null,waktuKumpul:serverTimestamp()
        });
        toast('✅ Jawaban tersimpan!');
        await renderTugasTab();
      };
      if(file){
        const prog=document.getElementById('kumpulProgress_'+tugasId);
        const fill=document.getElementById('kumpulProgressFill_'+tugasId);
        const txt=document.getElementById('kumpulProgressTxt_'+tugasId);
        const submitBtn=document.querySelector(`[onclick^="kumpulTugas('${tugasId}'"]`);
        if(submitBtn) submitBtn.disabled=true;
        if(prog) prog.style.display='block';
        try {
          const subFolder='tugas_'+_prt.id+'_'+tugasId;
          const result=await window._uploadToDrive(file,subFolder,(pct)=>{
            if(fill) fill.style.width=pct+'%';
            if(txt) txt.textContent='Mengupload '+pct+'%...';
          });
          await doSave(result.fileUrl,file.name,result.fileId,result.viewUrl);
        } catch(e) {
          toast('❌ Upload gagal: '+e.message);
          if(prog) prog.style.display='none';
          if(submitBtn) submitBtn.disabled=false;
        }
      } else {
        await doSave(oldFileUrl||null,oldNamaFile||null,oldFileId||null,oldViewUrl||null);
      }
    };

    window.lihatPengumpulan=async(tugasId,judulTugas)=>{
      const snap=await getDocs(collection(db,'pertemuan',_prt.id,'tugas',tugasId,'pengumpulan'));
      const list=[];snap.forEach(d=>list.push(d.data()));
      let html='';
      if(list.length===0){html=`<div class="empty" style="padding:30px"><div class="empty-ico">📭</div><h3>Belum ada yang mengumpulkan</h3></div>`;}
      else{
        html=`<div style="font-size:13px;color:var(--muted);margin-bottom:12px">${list.length} mahasiswa telah mengumpulkan</div>`;
        html+=list.map(k=>{
          const waktu=k.waktuKumpul?.toDate?k.waktuKumpul.toDate().toLocaleDateString('id-ID',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'-';
          return `<div class="kumpul-item">
            <div style="font-weight:600;font-size:14px">${k.nama}</div>
            <div style="font-size:12px;color:var(--muted)">NIM: ${k.nim||'-'} · ${waktu}</div>
            ${k.catatan?`<div style="font-size:13px;color:var(--ink2);margin-top:4px;padding:8px;background:var(--bg);border-radius:6px">"${k.catatan}"</div>`:''}
            ${k.fileUrl?`<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"><a href="${k.fileUrl}" target="_blank" class="btn-action btn-primary">${svgIcon('download')} ${k.namaFile||'Unduh File'}</a>${k.viewUrl?`<a href="${k.viewUrl}" target="_blank" class="btn-action btn-secondary">👁️ Lihat</a>`:''}</div>`:''}
          </div>`;
        }).join('');
      }
      openModal('Pengumpulan: '+judulTugas,html);
    };

    // ── KUIS TAB ──────────────────────────────────────────────
    async function renderKuisTab(){
      const isDsn = user.role === 'dosen';
      const tc = document.getElementById('tabContent');
      if(!tc) return;
      let kuisList = [];
      try {
        const snap = await getDocs(collection(db,'pertemuan',_prt.id,'kuis'));
        snap.forEach(d => kuisList.push({id:d.id,...d.data()}));
        kuisList.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
      } catch(e) {
        tc.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><h3>Gagal memuat kuis</h3><p>${e.message}</p></div>`;
        return;
      }
      let html = '';
      if(isDsn){
        if(kuisList.length===0){
          html+=`<div class="empty" style="padding:40px 20px"><div class="empty-ico">❓</div><h3>Belum ada kuis</h3><p>Buat kuis pilihan ganda untuk mahasiswa.</p></div>`;
        } else {
          html+=`<div class="tugas-list">`;
          for(const k of kuisList){
            const pertanyaanSnap=await getDocs(collection(db,'pertemuan',_prt.id,'kuis',k.id,'pertanyaan'));
            const jawabanSnap=await getDocs(collection(db,'pertemuan',_prt.id,'kuis',k.id,'jawaban'));
            html+=`
              <div class="tugas-card">
                <div class="tugas-card-header">
                  <div><div class="tugas-judul">${k.judul}</div><div class="tugas-meta">${svgIcon('help-circle')} ${pertanyaanSnap.size} soal · ${svgIcon('users')} ${jawabanSnap.size} peserta</div></div>
                  <div style="display:flex;gap:6px;align-items:flex-start">
                    <span class="badge badge-blue">${k.durasi||0} menit</span>
                    <button class="btn-action btn-danger" onclick="hapusKuis('${k.id}')">${svgIcon('trash')}</button>
                  </div>
                </div>
                <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
                  <button class="btn-action btn-secondary" onclick="lihatHasilKuis('${k.id}','${k.judul.replace(/'/g,"\\'")}')">📊 Lihat Hasil (${jawabanSnap.size})</button>
                </div>
              </div>`;
          }
          html+=`</div>`;
        }
        html+=`
          <div class="add-materi-card">
            <div class="add-materi-title">${svgIcon('plus')} Buat Kuis Baru</div>
            <div>
              <input class="inp" id="kuisJudul" placeholder="Judul kuis...">
              <input class="inp" type="number" id="kuisDurasi" placeholder="Durasi (menit), contoh: 30" min="1" max="180">
              <div style="font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:10px">Pertanyaan</div>
              <div id="daftarPertanyaan"></div>
              <button class="btn-action btn-secondary" style="margin-bottom:12px;width:100%;justify-content:center" onclick="tambahPertanyaan()">${svgIcon('plus')} Tambah Soal</button>
              <button class="btn-submit" onclick="simpanKuis()">Simpan Kuis</button>
            </div>
          </div>`;
        tc.innerHTML=html;
        window._pertanyaan=[];
        tambahPertanyaan();
      } else {
        if(kuisList.length===0){
          html+=`<div class="empty"><div class="empty-ico">❓</div><h3>Belum ada kuis</h3><p>Dosen belum membuat kuis untuk pertemuan ini.</p></div>`;
          tc.innerHTML=html; return;
        }
        html+=`<div class="tugas-list">`;
        for(const k of kuisList){
          let sudahKerjakan=false; let hasilData=null;
          try { const hSnap=await getDoc(doc(db,'pertemuan',_prt.id,'kuis',k.id,'jawaban',user.id)); if(hSnap.exists()){ sudahKerjakan=true; hasilData=hSnap.data(); } } catch(e){}
          const pertSnap=await getDocs(collection(db,'pertemuan',_prt.id,'kuis',k.id,'pertanyaan'));
          html+=`
            <div class="tugas-card">
              <div class="tugas-card-header">
                <div><div class="tugas-judul">${k.judul}</div><div class="tugas-meta">${svgIcon('help-circle')} ${pertSnap.size} soal · ⏱️ ${k.durasi||0} menit</div></div>
                ${sudahKerjakan?`<span class="badge badge-green">✅ Selesai</span>`:`<span class="badge badge-yellow">⏳ Belum dikerjakan</span>`}
              </div>
              ${sudahKerjakan
                ?`<div class="kumpul-info"><div style="font-size:14px;font-weight:700;color:var(--p)">Nilai: ${hasilData?.nilai||0} / 100</div><div style="font-size:12px;color:var(--muted);margin-top:2px">Benar: ${hasilData?.benar||0} dari ${hasilData?.total||0} soal</div></div>`
                :`<button class="btn-submit" style="margin-top:10px" onclick="mulaiKuis('${k.id}','${k.judul.replace(/'/g,"\\'")}',${k.durasi||0})">Mulai Kerjakan</button>`
              }
            </div>`;
        }
        html+=`</div>`;
        tc.innerHTML=html;
      }
    }

    window._pertanyaan=[];
    window.tambahPertanyaan=()=>{
      const idx=window._pertanyaan.length;
      window._pertanyaan.push({soal:'',pilihan:['','','',''],jawaban:0});
      const container=document.getElementById('daftarPertanyaan');
      if(!container)return;
      const div=document.createElement('div');
      div.className='soal-card';
      div.id='soal_'+idx;
      div.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-size:12px;font-weight:700;color:var(--p)">Soal ${idx+1}</div>
          <button class="btn-action btn-danger" onclick="hapusPertanyaan(${idx})" style="padding:4px 8px">${svgIcon('trash')}</button>
        </div>
        <textarea class="inp" placeholder="Tulis pertanyaan..." style="resize:vertical;min-height:60px;margin-bottom:8px" oninput="updateSoal(${idx},'soal',this.value)"></textarea>
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px">PILIHAN JAWABAN (klik radio = jawaban benar)</div>
        ${['A','B','C','D'].map((l,i)=>`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <input type="radio" name="jawaban_${idx}" value="${i}" onchange="updateSoal(${idx},'jawaban',${i})" ${i===0?'checked':''} style="accent-color:var(--p);width:16px;height:16px;flex-shrink:0">
            <span style="font-size:12px;font-weight:600;color:var(--p);width:16px">${l}.</span>
            <input class="inp" style="margin:0;flex:1" placeholder="Pilihan ${l}..." oninput="updateSoal(${idx},'pilihan_${i}',this.value)">
          </div>`).join('')}
      `;
      container.appendChild(div);
    };

    window.hapusPertanyaan=(idx)=>{ const el=document.getElementById('soal_'+idx); if(el)el.remove(); window._pertanyaan[idx]=null; };
    window.updateSoal=(idx,field,val)=>{
      if(!window._pertanyaan[idx])return;
      if(field==='soal')window._pertanyaan[idx].soal=val;
      else if(field==='jawaban')window._pertanyaan[idx].jawaban=parseInt(val);
      else if(field.startsWith('pilihan_')){const i=parseInt(field.split('_')[1]);window._pertanyaan[idx].pilihan[i]=val;}
    };

    window.simpanKuis=async()=>{
      const judul=document.getElementById('kuisJudul').value.trim();
      const durasi=parseInt(document.getElementById('kuisDurasi').value)||30;
      if(!judul)return toast('⚠️ Isi judul kuis dulu');
      const valid=window._pertanyaan.filter(p=>p&&p.soal.trim()&&p.pilihan.some(x=>x.trim()));
      if(valid.length===0)return toast('⚠️ Tambahkan minimal 1 soal');
      const kuisRef=await addDoc(collection(db,'pertemuan',_prt.id,'kuis'),{judul,durasi,createdAt:serverTimestamp()});
      for(let i=0; i<valid.length; i++){ await addDoc(collection(db,'pertemuan',_prt.id,'kuis',kuisRef.id,'pertanyaan'),{...valid[i], urutan:i}); }
      toast('✅ Kuis berhasil dibuat!');
      await renderKuisTab();
    };

    window.hapusKuis=async(kuisId)=>{ if(!confirm('Hapus kuis ini?'))return; await deleteDoc(doc(db,'pertemuan',_prt.id,'kuis',kuisId)); toast('🗑️ Kuis dihapus'); await renderKuisTab(); };

    // ── FIX 2: mulaiKuis - simpan soalList di window._currentSoalList, bukan di attribute HTML ──
    window.mulaiKuis=async(kuisId,judulKuis,durasi)=>{
      const pertSnap=await getDocs(collection(db,'pertemuan',_prt.id,'kuis',kuisId,'pertanyaan'));
      const soalList=[];
      pertSnap.forEach(d=>soalList.push({id:d.id,...d.data()}));
      soalList.sort((a,b)=>(a.urutan??0)-(b.urutan??0));
      if(soalList.length===0)return toast('⚠️ Kuis ini belum memiliki soal');

      // Simpan di window agar bisa diakses tanpa serialize ke HTML
      window._currentSoalList = soalList;
      window._currentKuisId = kuisId;

      let jawabanMhs=new Array(soalList.length).fill(null);
      let timeLeft=durasi*60;
      let timerInterval=null;

      const renderKuisModal=()=>{
        const menit=Math.floor(timeLeft/60).toString().padStart(2,'0');
        const detik=(timeLeft%60).toString().padStart(2,'0');
        const timerColor=timeLeft<60?'color:#dc2626':'color:var(--p)';
        let soalHtml=soalList.map((s,i)=>`
          <div class="soal-card" style="margin-bottom:12px">
            <div style="font-weight:600;font-size:14px;margin-bottom:10px">${i+1}. ${s.soal}</div>
            ${(s.pilihan||[]).map((p,j)=>`
              <label style="display:flex;align-items:center;gap:8px;padding:8px;border:1.5px solid ${jawabanMhs[i]===j?'var(--p)':'var(--border)'};border-radius:8px;margin-bottom:6px;cursor:pointer;background:${jawabanMhs[i]===j?'var(--pl)':'#fff'};transition:all .15s">
                <input type="radio" name="soal_${i}" value="${j}" ${jawabanMhs[i]===j?'checked':''} onchange="pilihJawaban(${i},${j})" style="accent-color:var(--p)">
                <span>${['A','B','C','D'][j]}. ${p}</span>
              </label>`).join('')}
          </div>`).join('');
        const content=`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:12px;background:var(--pl);border-radius:10px">
            <div style="font-size:13px;font-weight:600">${judulKuis}</div>
            ${durasi>0?`<div style="font-size:16px;font-weight:800;${timerColor}" id="kuisTimer">⏱️ ${menit}:${detik}</div>`:''}
          </div>
          <div id="soalContainer">${soalHtml}</div>
          <button class="btn-submit" onclick="kumpulKuis()" style="margin-top:8px">📤 Kumpulkan Jawaban</button>`;
        openModal('Kuis',content);
      };

      window.pilihJawaban=(soalIdx,pilihanIdx)=>{
        jawabanMhs[soalIdx]=pilihanIdx;
        document.querySelectorAll(`[name="soal_${soalIdx}"]`).forEach(r=>{
          const label=r.closest('label'); const j=parseInt(r.value);
          if(label){label.style.borderColor=jawabanMhs[soalIdx]===j?'var(--p)':'var(--border)';label.style.background=jawabanMhs[soalIdx]===j?'var(--pl)':'#fff';}
        });
      };

      // ── FIX 2: kumpulKuis tidak perlu parameter soalListData, ambil dari window ──
      window.kumpulKuis=async()=>{
        if(timerInterval)clearInterval(timerInterval);
        const soalListData=window._currentSoalList;
        const kId=window._currentKuisId;
        let benar=0;
        soalListData.forEach((s,i)=>{if(jawabanMhs[i]===s.jawaban)benar++;});
        const total=soalListData.length;
        const nilai=Math.round((benar/total)*100);
        await setDoc(doc(db,'pertemuan',_prt.id,'kuis',kId,'jawaban',user.id),{
          mahasiswaId:user.id,nama:user.nama,nim:user.nim||'-',jawaban:jawabanMhs,benar,total,nilai,waktu:serverTimestamp()
        });
        closeModal();
        toast(`✅ Selesai! Nilai: ${nilai} (${benar}/${total} benar)`);
        await renderKuisTab();
      };

      renderKuisModal();
      if(durasi>0){
        timerInterval=setInterval(()=>{
          timeLeft--;
          const el=document.getElementById('kuisTimer');
          if(el){const m=Math.floor(timeLeft/60).toString().padStart(2,'0');const s=(timeLeft%60).toString().padStart(2,'0');el.textContent=`⏱️ ${m}:${s}`;el.style.color=timeLeft<60?'#dc2626':'var(--p)';}
          if(timeLeft<=0){clearInterval(timerInterval);toast('⏰ Waktu habis! Jawaban dikumpulkan otomatis.');window.kumpulKuis();}
        },1000);
      }
    };

    window.lihatHasilKuis=async(kuisId,judulKuis)=>{
      const snap=await getDocs(collection(db,'pertemuan',_prt.id,'kuis',kuisId,'jawaban'));
      const list=[];snap.forEach(d=>list.push(d.data()));list.sort((a,b)=>(b.nilai||0)-(a.nilai||0));
      let html='';
      if(list.length===0){html=`<div class="empty" style="padding:30px"><div class="empty-ico">📊</div><h3>Belum ada peserta</h3></div>`;}
      else{
        const rataRata=Math.round(list.reduce((s,x)=>s+(x.nilai||0),0)/list.length);
        html=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
          <div style="background:var(--pl);border-radius:10px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:var(--p)">${list.length}</div><div style="font-size:12px;color:var(--muted)">Peserta</div></div>
          <div style="background:#ecfdf5;border-radius:10px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:var(--g)">${rataRata}</div><div style="font-size:12px;color:var(--muted)">Rata-rata Nilai</div></div>
        </div>
        <div class="tugas-list">${list.map((r,i)=>`
          <div class="kumpul-item" style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;font-weight:700;color:var(--muted)">#${i+1}</span><span style="font-weight:600">${r.nama}</span></div>
              <div style="font-size:12px;color:var(--muted)">NIM: ${r.nim||'-'} · Benar ${r.benar}/${r.total}</div>
            </div>
            <div style="font-size:20px;font-weight:800;color:${r.nilai>=70?'var(--g)':r.nilai>=50?'var(--a)':'var(--r)'}">${r.nilai}</div>
          </div>`).join('')}</div>`;
      }

    async function renderTugasMhs(){
  setContent('<div class="loading"><div class="spin"></div><span>Memuat tugas...</span></div>');
  try {
    const prtSnap = await getDocs(collection(db,'pertemuan'));
    const prts = [];
    prtSnap.forEach(d => prts.push({id:d.id,...d.data()}));
    prts.sort((a,b)=>(a.pertemuanKe||0)-(b.pertemuanKe||0));

    let semuaTugas = [];
    for(const p of prts){
      const tugasSnap = await getDocs(collection(db,'pertemuan',p.id,'tugas'));
      for(const td of tugasSnap.docs){
        const t = {id:td.id, prtId:p.id, prtKe:p.pertemuanKe, prtTopik:p.topik||'', ...td.data()};
        let sudahKumpul = false;
        try {
          const kSnap = await getDoc(doc(db,'pertemuan',p.id,'tugas',td.id,'pengumpulan',user.id));
          sudahKumpul = kSnap.exists();
        } catch(e){}
        semuaTugas.push({...t, sudahKumpul});
      }
    }

    // Pisahkan: belum kumpul vs sudah kumpul, urutkan deadline terdekat dulu
    const belumKumpul = semuaTugas.filter(t=>!t.sudahKumpul);
    const sudahKumpul = semuaTugas.filter(t=>t.sudahKumpul);
    const sortByDeadline = (a,b)=>{
      if(!a.batasWaktu && !b.batasWaktu) return 0;
      if(!a.batasWaktu) return 1;
      if(!b.batasWaktu) return -1;
      return new Date(a.batasWaktu)-new Date(b.batasWaktu);
    };
    belumKumpul.sort(sortByDeadline);
    sudahKumpul.sort(sortByDeadline);
    const ordered = [...belumKumpul, ...sudahKumpul];

    if(ordered.length === 0){
      setContent(`<div class="empty"><div class="empty-ico">📝</div><h3>Belum ada tugas</h3><p>Dosen belum memberikan tugas apapun.</p></div>`);
      return;
    }
// ──Tugas mahasiswa
    const renderKartuTugas = (t) => {
      const batas = t.batasWaktu ? new Date(t.batasWaktu) : null;
      const terlambat = batas && new Date() > batas;
      const batasStr = batas ? batas.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Tidak ada batas';
      const selisihMs = batas ? batas - new Date() : null;
      const selisihHari = selisihMs ? Math.ceil(selisihMs/1000/60/60/24) : null;
      let deadlineBadge = '';
      if(t.sudahKumpul){
        deadlineBadge = `<span class="badge badge-green">✅ Terkumpul</span>`;
      } else if(terlambat){
        deadlineBadge = `<span class="badge badge-red">⏰ Terlambat</span>`;
      } else if(selisihHari !== null && selisihHari <= 1){
        deadlineBadge = `<span class="badge badge-red">🔥 Deadline Hari Ini</span>`;
      } else if(selisihHari !== null && selisihHari <= 3){
        deadlineBadge = `<span class="badge badge-yellow">⚠️ ${selisihHari} hari lagi</span>`;
      } else {
        deadlineBadge = `<span class="badge badge-yellow">⏳ Belum Kumpul</span>`;
      }
      return `
        <div class="tugas-card" style="${t.sudahKumpul?'opacity:.75':''}">
          <div style="font-size:11px;font-weight:700;color:var(--p);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">
            Pertemuan ${t.prtKe} · ${t.prtTopik}
          </div>
          <div class="tugas-card-header">
            <div>
              <div class="tugas-judul">${t.judul}</div>
              <div class="tugas-meta">${svgIcon('clock')} ${batasStr}</div>
            </div>
            ${deadlineBadge}
          </div>
          ${t.deskripsi?`<div class="tugas-deskripsi">${t.deskripsi}</div>`:''}
          <div style="margin-top:10px">
            <button class="btn-action btn-secondary" onclick="bukaPrt('${t.prtId}');setTimeout(()=>loadTab('tugas'),600)">
              ${t.sudahKumpul ? '👁️ Lihat Tugas' : '📤 Kerjakan Tugas'}
            </button>
          </div>
        </div>`;
    };

    let html = '';

    // Bagian belum dikumpul
    if(belumKumpul.length > 0){
      html += `<div class="section-title" style="margin-bottom:10px">⏳ Belum Dikumpulkan (${belumKumpul.length})</div>`;
      html += `<div class="tugas-list">${belumKumpul.map(renderKartuTugas).join('')}</div>`;
    }

    // Bagian sudah dikumpul
    if(sudahKumpul.length > 0){
      html += `<div class="section-title" style="margin:16px 0 10px">✅ Sudah Dikumpulkan (${sudahKumpul.length})</div>`;
      html += `<div class="tugas-list">${sudahKumpul.map(renderKartuTugas).join('')}</div>`;
    }

    setContent(html);
  } catch(e){
    setContent(`<div class="empty"><div class="empty-ico">⚠️</div><h3>Gagal memuat tugas</h3><p>${e.message}</p></div>`);
  }
}

window.autoResizeChat = (el) => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
};

function startChatListener(){
  if(_chatUnsub){ _chatUnsub(); _chatUnsub = null; }
  const q = query(collection(db,'chat'), orderBy('createdAt','asc'));
  _chatUnsub = onSnapshot(q, (snap) => {
    const el = document.getElementById('chatMessages');
    if(!el){ if(_chatUnsub){_chatUnsub();_chatUnsub=null;} return; }
    const msgs = [];
    snap.forEach(d => msgs.push({id:d.id,...d.data()}));
    if(msgs.length === 0){
      el.innerHTML = `
        <div style="text-align:center;padding:40px 20px;color:var(--muted)">
          <div style="font-size:48px;margin-bottom:12px">💬</div>
          <div style="font-weight:600;margin-bottom:4px">Belum ada pesan</div>
          <div style="font-size:12px">Mulai percakapan sekarang!</div>
        </div>`;
      return;
    }
    let html = '';
    let lastDate = '';
    let lastSenderId = '';
    let lastSenderTime = null;
    msgs.forEach((m) => {
      const tgl = m.createdAt?.toDate ? m.createdAt.toDate() : new Date();
      const tglStr = tgl.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
      const jamStr = tgl.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
      if(tglStr !== lastDate){
        html += `
          <div style="display:flex;align-items:center;gap:10px;margin:8px 0">
            <div style="flex:1;height:1px;background:var(--border)"></div>
            <div style="font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;background:var(--bg);padding:2px 10px;border-radius:20px;border:1px solid var(--border)">${tglStr}</div>
            <div style="flex:1;height:1px;background:var(--border)"></div>
          </div>`;
        lastDate = tglStr;
      }
      const isMe = m.pengirimId === user.id;
      const isDosen = m.pengirimRole === 'dosen';
      const inisial = (m.pengirimNama||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
      const selisihWaktu = lastSenderTime ? (tgl - lastSenderTime)/1000/60 : 999;
      const showAvatar = !isMe && (m.pengirimId !== lastSenderId || selisihWaktu > 3);
      lastSenderId = m.pengirimId;
      lastSenderTime = tgl;
      const tombolHapus = (user.role==='dosen'||m.pengirimId===user.id)
        ? `<button onclick="hapusChat('${m.id}')" style="background:none;border:none;cursor:pointer;color:var(--muted);padding:0;opacity:.5;line-height:1" title="Hapus">${svgIcon('trash')}</button>`
        : '';
      if(isMe){
        html += `
          <div style="display:flex;justify-content:flex-end;align-items:flex-end;gap:6px;margin-bottom:1px" id="msg_${m.id}">
            <div style="max-width:72%">
              <div style="background:var(--p);color:#fff;border-radius:16px 16px 4px 16px;padding:10px 14px;font-size:14px;line-height:1.5;word-break:break-word;box-shadow:0 1px 4px rgba(79,70,229,.25)">
                ${escapeHtml(m.isi)}
              </div>
              <div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:3px">
                <span style="font-size:10px;color:var(--muted)">${jamStr}</span>
                ${tombolHapus}
              </div>
            </div>
          </div>`;
      } else {
        html += `
          <div style="display:flex;align-items:flex-end;gap:6px;margin-bottom:1px" id="msg_${m.id}">
            <div style="width:30px;flex-shrink:0;margin-bottom:18px">
              ${showAvatar?`<div style="width:30px;height:30px;border-radius:8px;background:${isDosen?'linear-gradient(135deg,var(--p),#7c3aed)':'linear-gradient(135deg,#059669,#0d9488)'};color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center">${inisial}</div>`:''}
            </div>
            <div style="max-width:72%">
              ${showAvatar?`<div style="font-size:11px;font-weight:700;color:${isDosen?'var(--p)':'var(--ink2)'};margin-bottom:3px;padding-left:2px">${m.pengirimNama}${isDosen?' 👨‍🏫':''}</div>`:''}
              <div style="background:${isDosen?'var(--pl)':'#fff'};border:1px solid ${isDosen?'rgba(79,70,229,.25)':'var(--border)'};border-radius:16px 16px 16px 4px;padding:10px 14px;font-size:14px;line-height:1.5;word-break:break-word;box-shadow:var(--shadow)">
                ${escapeHtml(m.isi)}
              </div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:3px;padding-left:2px">
                <span style="font-size:10px;color:var(--muted)">${jamStr}</span>
                ${tombolHapus}
              </div>
            </div>
          </div>`;
      }
    });
    const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
    el.innerHTML = html;
    if(wasAtBottom) el.scrollTop = el.scrollHeight;
  }, (err) => console.error('Chat error:', err));
}

function escapeHtml(str){
  return (str||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/\n/g,'<br>');
}

window.kirimChat = async () => {
  const input = document.getElementById('chatInput');
  const isi = input?.value.trim();
  if(!isi) return;
  input.value = '';
  input.style.height = 'auto';
  try {
    await addDoc(collection(db,'chat'),{
      isi,
      pengirimId: user.id,
      pengirimNama: user.nama,
      pengirimRole: user.role,
      createdAt: serverTimestamp()
    });
  } catch(e){
    toast('❌ Gagal kirim: '+e.message);
    input.value = isi;
  }
};

window.hapusChat = async (msgId) => {
  if(!confirm('Hapus pesan ini?')) return;
  try {
    await deleteDoc(doc(db,'chat',msgId));
    toast('🗑️ Pesan dihapus');
  } catch(e){ toast('❌ Gagal: '+e.message); }
};

    async function loadNotif(){

      el.innerHTML=list.map(n=>{
        const waktu=n.createdAt?.toDate?n.createdAt.toDate().toLocaleDateString('id-ID',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';

        </div>`;
      }).join('');

    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: rgba(255,255,255,.55); cursor: pointer; border-radius: 8px; margin-bottom: 2px; font-size: 13px; font-weight: 500; transition: all .15s; }
    .nav-item:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.9); }
    .nav-item.on { background: rgba(79,70,229,.35); color: #fff; }

    .nav-ico { width: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .nav-lbl { flex: 1; }
    .nav-logout { margin-top: 8px; border-top: 1px solid rgba(255,255,255,.06); padding-top: 12px; }
    /* ── FIX 1: Info bar mata kuliah ── */
    .matkul-info-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .matkul-info-item { display: flex; flex-direction: column; gap: 2px; }
    .matkul-info-label { font-size: 11px; color: var(--muted); font-weight: 600; }
    .matkul-info-val { font-size: 13px; font-weight: 700; color: var(--ink); }
    .dash-hero { background: linear-gradient(135deg, var(--p), #7c3aed); border-radius: 16px; padding: 24px; margin-bottom: 16px; color: white; }
    .dash-greet { font-size: 13px; opacity: .8; font-weight: 500; margin-bottom: 4px; }
    .dash-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .dash-sub { font-size: 13px; opacity: .7; }
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); transition: transform .15s, box-shadow .15s; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .stat-ico { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .stat-val { font-size: 24px; font-weight: 800; line-height: 1.2; margin-bottom: 4px; color: var(--ink); }
    .stat-lbl { font-size: 12px; color: var(--muted); font-weight: 500; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .quick-actions { margin-top: 4px; }
    .qa-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-top: 10px; }
    .qa-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 12px; cursor: pointer; text-align: center; font-size: 13px; font-weight: 500; color: var(--ink2); transition: all .15s; box-shadow: var(--shadow); }
    .qa-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--p); }
    .qa-ico { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
    .prt-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .prt-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: all .15s; box-shadow: var(--shadow); position: relative; overflow: hidden; }
    .prt-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--p), #7c3aed); opacity: 0; transition: opacity .15s; }
    .prt-card:hover { border-color: var(--p); box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .prt-card:hover::before { opacity: 1; }
    .prt-num { font-size: 11px; font-weight: 700; color: var(--p); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .prt-topik { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.4; }
    .prt-arrow { margin-top: 12px; color: var(--muted); transform: rotate(180deg); }
    .prt-detail-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
    .prt-detail-badge { font-size: 11px; font-weight: 700; color: var(--p); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .prt-detail-title { font-size: 16px; font-weight: 700; color: var(--ink); }
    .btn-back { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 9px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--ink2); white-space: nowrap; transition: all .15s; flex-shrink: 0; font-family: inherit; }
    .btn-back:hover { border-color: var(--p); color: var(--p); }
    .dtabs { display: flex; gap: 4px; margin-bottom: 16px; background: #fff; padding: 4px; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .dtab { flex: 1; padding: 9px; text-align: center; border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--muted); transition: all .15s; }
    .dtab.on { background: var(--p); color: #fff; font-weight: 700; box-shadow: 0 2px 8px rgba(79,70,229,.3); }
    .materi-list { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .materi-item { display: flex; align-items: center; gap: 14px; padding: 16px; border-bottom: 1px solid var(--border); transition: background .1s; }
    .materi-item:last-child { border-bottom: none; }
    .materi-item:hover { background: #fafafa; }
    .materi-icon-wrap { font-size: 28px; flex-shrink: 0; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--bg); border-radius: 10px; }
    .materi-info { flex: 1; min-width: 0; }
    .materi-judul { font-weight: 600; font-size: 14px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .materi-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .materi-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-action { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; text-decoration: none; white-space: nowrap; }
    .btn-primary { background: var(--p); color: #fff; }
    .btn-primary:hover { background: var(--pd); }
    .btn-secondary { background: #f3f4f6; color: var(--ink2); }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-danger { background: var(--rb); color: var(--r); }
    .btn-danger:hover { background: #fecaca; }
    .materi-konten { font-size: 14px; line-height: 1.8; color: var(--ink); }
    .add-materi-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); margin-top: 16px; overflow: hidden; box-shadow: var(--shadow); }
    .add-materi-title { display: flex; align-items: center; gap: 8px; padding: 16px 18px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 14px; color: var(--ink); background: var(--bg); }
    .add-materi-card > div:not(.add-materi-title) { padding: 18px; }
    .tipe-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tipe-tab { display: flex; align-items: center; justify-content: center; gap: 7px; flex: 1; padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--muted); transition: all .15s; font-family: inherit; }
    .tipe-tab.on { border-color: var(--p); background: var(--pl); color: var(--p); font-weight: 700; }
    .upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 36px 20px; text-align: center; cursor: pointer; transition: all .15s; margin-bottom: 12px; }
    .upload-area:hover { border-color: var(--p); background: var(--pl); }
    .upload-ico { display: flex; justify-content: center; margin-bottom: 10px; color: var(--muted); }
    .upload-txt { font-weight: 600; font-size: 14px; margin-bottom: 4px; color: var(--ink); }
    .upload-sub { font-size: 12px; color: var(--muted); }
    .file-preview-box { display: flex; align-items: center; gap: 12px; padding: 14px; background: #ecfdf5; border-radius: 10px; margin-bottom: 12px; border: 1px solid #6ee7b7; }
    .upload-progress { margin-bottom: 12px; }
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--p), #7c3aed); border-radius: 3px; transition: width .3s; }
    .progress-txt { font-size: 12px; color: var(--muted); text-align: center; font-weight: 500; }
    .tugas-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .tugas-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
    .tugas-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .tugas-judul { font-weight: 700; font-size: 15px; color: var(--ink); }
    .tugas-meta { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; align-items: center; gap: 5px; }
    .tugas-deskripsi { font-size: 13px; color: var(--ink2); line-height: 1.6; }
    .kumpul-info { margin-top: 10px; padding: 10px 12px; background: #ecfdf5; border-radius: 8px; border: 1px solid #6ee7b7; }
    .kumpul-item { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .badge-green { background: #ecfdf5; color: var(--g); }
    .badge-red { background: var(--rb); color: var(--r); }
    .badge-yellow { background: #fffbeb; color: var(--a); }
    .badge-blue { background: var(--pl); color: var(--p); }
    .soal-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
    .mhs-table-wrap { overflow-x: auto; background: #fff; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    .mhs-table { width: 100%; border-collapse: collapse; }
    .mhs-table th { padding: 12px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); background: var(--bg); white-space: nowrap; }
    .mhs-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .mhs-table tr:last-child td { border-bottom: none; }
    .mhs-table tr:hover td { background: #fafafa; }
    .profil-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; text-align: center; max-width: 400px; margin: 0 auto; box-shadow: var(--shadow); }
    .profil-av { width: 72px; height: 72px; border-radius: 20px; background: linear-gradient(135deg, var(--p), #7c3aed); color: #fff; font-size: 24px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .profil-nama { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .profil-email { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .profil-badge { display: inline-block; background: var(--pl); color: var(--p); font-size: 12px; font-weight: 700; padding: 5px 14px; border-radius: 20px; margin-bottom: 12px; }
    .profil-detail { font-size: 13px; color: var(--ink2); padding: 6px 0; border-bottom: 1px solid var(--border); }
    .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: flex-end; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
    .modal-bg.open { display: flex; }
    .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; animation: slideUp .25s ease; }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-hd { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #fff; z-index: 1; }
    .modal-title { font-weight: 700; font-size: 16px; color: var(--ink); }
    .modal-x { border: none; background: #f3f4f6; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: background .15s; }
    .modal-x:hover { background: #e5e7eb; }
    .modal-body { padding: 20px; }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 40px; z-index: 999; opacity: 0; transition: all .22s; pointer-events: none; white-space: nowrap; font-size: 13px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,.25); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 60px 20px; color: var(--muted); font-size: 13px; }
    .spin { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--p); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-ico { font-size: 48px; margin-bottom: 12px; }
    .empty h3 { font-size: 16px; font-weight: 700; color: var(--ink2); margin-bottom: 6px; }
    .empty p { font-size: 13px; }
    @media(max-width: 768px){
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 45; transform: translateX(-100%); width: 260px; }
      .sidebar.open { transform: translateX(0); box-shadow: 0 0 40px rgba(0,0,0,.5); }
      .bottom-nav { display: block; }
      .content { padding: 16px; padding-bottom: calc(var(--bot) + 16px); }
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .qa-grid { grid-template-columns: 1fr 1fr; }
      .prt-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .materi-actions { flex-direction: column; }
      .toast { bottom: calc(var(--bot) + 16px); }
      .mhs-table th, .mhs-table td { padding: 10px 10px; }
      .matkul-info-bar { grid-template-columns: 1fr 1fr; }
    }
    @media(max-width: 480px){
      .prt-grid { grid-template-columns: 1fr 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .matkul-info-bar { grid-template-columns: 1fr 1fr; }
    }
    .ql-toolbar { border-radius: 10px 10px 0 0 !important; border-color: var(--border) !important; background: var(--bg) !important; }
    .ql-container { border-radius: 0 0 10px 10px !important; border-color: var(--border) !important; font-family: 'Inter', system-ui, sans-serif !important; font-size: 14px !important; }
    .ql-editor { min-height: 200px; }
    #chatMessages::-webkit-scrollbar { width: 4px; }
    #chatMessages::-webkit-scrollbar-track { background: transparent; }
    #chatMessages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-brand-logo"><img src="images/logo.png" style="width:220px;height:auto;display:block;margin:0 auto;"></div>
      <!--<h1>EduCampus</h1>-->
      <p>Platform pembelajaran digital</p>
    </div>
    <div class="login-card">
      <div class="role-tabs">
        <div class="role-tab on" id="tabM" onclick="setRole('mahasiswa')">🎓 Mahasiswa</div>
        <div class="role-tab" id="tabD" onclick="setRole('dosen')">👨‍🏫 Dosen</div>
      </div>
      <div class="auth-msg" id="authErr"></div>
      <div class="auth-msg" id="authOk"></div>
      <div class="dosen-info" id="dosenInfo"><strong>👨‍🏫 Akun Dosen</strong> — Login dengan akun yang telah disiapkan admin.</div>
      <div id="fLogin">
        <input class="inp" id="lEmail" placeholder="Alamat email" type="email" autocomplete="email">
        <input class="inp" id="lPass" placeholder="Password" type="password" autocomplete="current-password">
        <button class="btn-submit" id="loginBtn" onclick="doLogin()">Masuk</button>
        <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted)" id="switchLink">
          Belum punya akun? <span style="color:var(--p);font-weight:600;cursor:pointer" onclick="toggleReg()">Daftar sekarang</span>
        </div>
      </div>
      <div id="fReg" style="display:none">
        <input class="inp" id="rNama" placeholder="Nama Lengkap">
        <input class="inp" id="rNim" placeholder="NIM">
        <input class="inp" id="rEmail" placeholder="Alamat email" type="email">
        <input class="inp" id="rPass" placeholder="Password (min. 6 karakter)" type="password">
        <input class="inp" id="rSem" placeholder="Semester" type="number" min="1" max="14">
        <input class="inp" id="rProdi" placeholder="Program Studi">
        <button class="btn-submit" onclick="doRegister()">Buat Akun</button>
        <div style="text-align:center;margin-top:14px;font-size:13px;color:var(--muted);cursor:pointer" onclick="toggleReg()">
          Sudah punya akun? <span style="color:var(--p);font-weight:600">Masuk</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar" id="sidebar">
    <!--<div class="sb-brand">🎓 EduCampus</div>-->
    <div class="sb-brand"><img src="images/logos.png"  style="height:32px;object-fit:contain;flex-shrink:0;"></div>
    <div class="sb-user">
      <div class="sb-av" id="sbAv">?</div>
      <div style="min-width:0">
        <div class="sb-uname" id="sbName">...</div>
        <div id="sbRole"></div>
      </div>
    </div>
    <div class="sb-nav" id="navMenu"></div>
  </div>

  <div class="main">
    <header class="topbar">
      <button onclick="openSidebar()" style="background:none;border:none;cursor:pointer;padding:4px;color:var(--ink);display:none" id="menuBtn">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div id="topActions"></div>
    </header>
    <div class="content" id="content"></div>
  </div>

  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBox"></div>
</div>
<div class="toast" id="toast"></div>
<div id="sbOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:44;opacity:0;pointer-events:none;transition:opacity .25s" onclick="closeSidebar()"></div>

<script>
  if(window.innerWidth<=768){
    document.getElementById('menuBtn').style.display='block';
  }
</script>
</body>
</html>
